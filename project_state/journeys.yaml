      - cursor pagination drives full-tenant enumeration when skus is omitted (limit defaults to 100/page)
      - api-key header used (NOT Basic auth — that is the v1 ssapi.shipstation.com path)
      - adjustInventoryV2 rejects modify new_available:0 client-side (Phase 0 Patch D2 — API would 400 anyway, fail fast)
      - adjustInventoryV2 rejects increment/decrement quantity:0 client-side
      - adjustInventoryV2 accepts adjust quantity:0 (asymmetric safety net per Patch D2)
      - module deliberately does NOT export getInventoryBySku — single-record reads do listInventory({skus:[s]})
      - CI guard scripts/check-v2-inventory-batch.sh fails the release gate on reintroduction of single-SKU read helpers

  - id: shipstation_v2_inventory_seed
    area: integrations
    description: One-shot ShipStation v2 inventory seed per workspace (Phase 3, 2026-04-13)
    paths:
      - src/trigger/tasks/shipstation-seed-inventory.ts
      - src/trigger/tasks/shipstation-store-refresh.ts
      - src/trigger/tasks/index.ts
      - src/actions/shipstation-seed.ts
      - src/app/admin/settings/shipstation-seed/page.tsx
      - src/lib/server/bandcamp-effective-available.ts
      - src/lib/clients/shipstation-inventory-v2.ts
      - tests/unit/trigger/shipstation-seed-inventory.test.ts
      - tests/unit/trigger/shipstation-store-refresh.test.ts
      - tests/unit/lib/server/bandcamp-effective-available.test.ts
      - tests/unit/actions/shipstation-seed.test.ts
    status: green
    checks:
      - selection cascade: org_id IS NOT NULL (fulfillment client only) → not in bundle_components.bundle_variant_id (Phase 2.5(a) bundle exclusion) → bandcamp_product_mappings.push_mode='normal' → computeEffectiveBandcampAvailable(bandcamp_origin_quantities) > 0 → warehouse_inventory_levels.available > 0
      - origin sum is computed from bandcamp_origin_quantities (Bandcamp's actual controlled stock), NOT the customer-facing TOP quantity_available which can be inflated by merchant-set baselines (Part 9 audit finding)
      - push value = warehouse_inventory_levels.available via adjustInventoryV2({ transaction_type:'increment' }); the Phase 1 bandcamp-sync seed correction populates warehouse_inventory_levels from the origin sum upstream
      - idempotent via external_sync_events ledger keyed by (system='shipstation_v2', correlation_id='seed:{workspace_id}:{run_id}', sku, action='increment') — retries with the same ctx.run.id short-circuit on duplicate insert
      - pinned to shipstationQueue (concurrencyLimit 1, shared with process-shipstation-shipment) so seed bursts cannot starve real-time SHIP_NOTIFY processing or vice versa
      - dryRun mode evaluates the full gate cascade without calling adjustInventoryV2 — drives the admin Preview button
      - bulk-shaped operation — does NOT route through recordInventoryChange() (Rule #59); Phase 5 reconcile sensor catches drift
      - Server Action gates: requireAuth + isStaff + workspaceId == userRecord.workspace_id; Rule #41 (no unbounded work — preview polls inline up to 25s then returns pending status); Rule #48 (never calls ShipStation directly — always tasks.trigger)
      - run history written to channel_sync_log (channel='shipstation_v2', sync_type='seed_inventory') for the admin "Recent runs" panel
      - shipstation-store-refresh task is currently a STUB returning status:'deferred' with reason 'endpoint_tbd_using_24h_auto_import_fallback' until Open Question #2 (public refresh endpoint) is resolved; logs the request to channel_sync_log so operators can see refresh attempts

  - id: shipstation_product_import_export
    area: integrations
    description: Operator-driven generation of the ShipStation product-import file (CSV + XLSX), with run history and incremental "new since last export" mode (2026-04-20)
    paths:
      - src/lib/server/shipstation-export.ts
      - src/trigger/tasks/shipstation-export.ts
      - src/actions/shipstation-export.ts
      - src/app/admin/settings/shipstation-export/page.tsx
      - scripts/export-shipstation-import.ts
      - supabase/migrations/20260420000006_shipstation_export_runs.sql
      - tests/unit/actions/shipstation-export.test.ts
    status: green
    checks:
      - single source of truth for the 30-column ShipStation header lives in `src/lib/server/shipstation-export.ts::buildShipstationExport({ supabase, sinceTs? })` — the CLI, the Trigger task, and the admin button all consume it (Rule #58 one-truth-per-concern)
      - boolean columns Use Product Name / Active / Is Returnable / Track inventory emit literal "true"/"false" — ShipStation parses anything else (e.g. Yes/No) as the default false and prints a per-row WARNING during import preview
      - SKU normalization strips U+FEFF / U+200B-D / U+2060 zero-width characters via alternation (the noMisleadingCharacterClass biome rule rejects ZWJ inside a character class because it composes emoji); collisions are flagged in `shipstation_export_runs.duplicate_skus` jsonb and the per-run summary.json
      - Trigger task `shipstation-export` runs in Trigger.dev infra (Rule #54) so the 6-7s CSV+XLSX build can scale far past Vercel's 60s — Server Actions only enqueue (Rule #41) and never call the builder directly
      - Storage bucket `shipstation-exports` is private; `getShipstationExportDownloadUrls` issues 1h signed URLs scoped to the caller's workspace (cross-workspace download rejected) and only completed runs are downloadable
      - incremental mode chains via `since_ts = previous completed run.data_max_ts` (max(created_at) of variants included). First incremental run with no prior history degrades to full export. The `data_max_ts` is computed in the builder, NOT at task-end-of-run, so retries with the same payload land the same cutoff
      - admin UI polls `listShipstationExportRuns` every 3s while any pending/running row exists — stops polling automatically once the run completes or fails
      - CLI `scripts/export-shipstation-import.ts` accepts `--since=ISO_TS` for ad-hoc incremental runs from a developer terminal — same builder, no Storage upload (writes to `reports/shipstation-import/`)
      - Server Action gates: requireAuth + isStaff for all three verbs; cross-workspace download is explicitly rejected even though RLS is staff-only (defense in depth)
      - first-run output (2026-04-20T15:22): 3,048 variants loaded → 3,047 rows written → 100% coverage on SKU/Name/Description/Category/Tags 1-3/Customs Description+Value+Tariff, 99.7% Weight, ~50% Thumbnail, 27% UPC, 21.6% Fulfillment Barcode, 0% Warehouse Location + Dimensions (no warehouse_variant_locations rows yet; staff fills in pre-upload). One BOM-corrupted SKU `LP-zum-025` collision flagged for cleanup
      - failure mode: if the Trigger task throws, the run row is updated with `status='failed'` + `error` text, and the admin UI surfaces the message inline in the Recent runs table

  - id: bandcamp_warehouse_seed_origin_truth
    area: integrations
    description: bandcamp-sync warehouse_inventory_levels seed reflects controlled stock (origin sum), not customer-facing TOP (Phase 1 follow-up #2, 2026-04-13)
    paths:
      - src/lib/server/bandcamp-effective-available.ts
      - src/trigger/tasks/bandcamp-sync.ts
      - tests/unit/lib/server/bandcamp-effective-available.test.ts
    status: green
    checks:
      - computeBandcampSeedQuantity({ quantity_available, origin_quantities }) is the only function that decides the warehouse seed quantity from Bandcamp; both seed sites in bandcamp-sync.ts (existing-mapping bandcamp_initial branch and brand-new-variant block) consume it
      - non-empty origin_quantities array → trust the origin sum (Lord Spikeheart shape: TOP=100, origin=0 → seed 0); empty/null → fall back to TOP and tag effective_source='top_fallback' so operators can grep warehouse_inventory_activity for merchants without origin metadata
      - recordInventoryChange metadata always includes effective_source ∈ {origin_sum, top_fallback, zero}, effective_quantity, top_quantity_available
      - hard prerequisite for Phase 4: SHIP_NOTIFY decrements would otherwise echo inflated values back to Bandcamp via update_quantities, doubling customer-visible stock

