  - id: sku_matching_review
    area: admin_settings
    paths:
      - src/app/admin/settings/sku-matching/page.tsx
      - src/app/admin/settings/sku-matching/sku-matching-client.tsx
      - src/actions/sku-matching.ts
      - src/lib/server/sku-matching.ts
      - src/lib/clients/store-sync-client.ts
      - src/actions/sku-conflicts.ts
    status: green
    checks:
      - page boot is connection-scoped and server-rendered, not client-bootstrap query driven
      - staff can review canonical rows, matched rows, remote-only rows, and duplicate/conflict overlays one connection at a time
      - accepted matches persist through persist_sku_match RPC and leave an append-only sku_mapping_events audit trail
      - preview drawer blocks stale approvals when the candidate fingerprint changes
      - preview drawer confirm/accept actions pass JSON-plain payloads to Server Actions and receive JSON-plain RPC results so prior preview-response objects and PostgREST/RPC rows cannot trip React Server Action serialization
      - row and preview surfaces expose Shopify storefront and Bandcamp product links when source URLs are available so staff can visually compare before approval
      - candidate fingerprints are computed from the shared helper across workspace load, preview, single accept, and bulk accept; disqualifier order cannot produce false stale-review rejects
      - Bandcamp mapping relation arrays are reduced through deterministic URL/timestamp/id selection before exposing bandcampUrl
      - remote target lookup is ordered inventory item -> variant -> product and blocks SKU-less multi-variant product-only matches instead of guessing by array order
      - changing client or connection clears stale query params, selection, preview state, mutation errors, and pending row state
      - dense SKU matching cards render fully below the page-local 2000-row threshold; growth above 1500 rows emits passive telemetry
      - Shopify rows surface readiness before approval and can activate inventory at the selected default location without changing quantity
      - live alias writes pass the shared scope trigger even though client_store_sku_mappings has no org_id column; optional org checks are JSONB-derived and workspace/variant checks still apply
      - Accept best match failures surface once via the page-level action alert; successful Accept smoke testing has no visible action errors, console errors, or non-aborted network failures
      - Accept best match validates stale fingerprints without running Shopify readiness checks, removes the row optimistically, refreshes the workspace in the background, and shows saved/rejected feedback through a viewport-fixed SKU matching toaster
      - review drawer can search the remote catalog by title, SKU, artist/vendor, barcode, product ID, variant ID, and inventory item ID
      - remote search results are height-bounded, internally scrollable, and force-wrap long Shopify IDs so a long result set cannot trap or horizontally clip the preview/confirm workflow
      - selected remote search results re-preview the exact remote product/variant before Confirm match persists a manual strong alias through persist_sku_match
      - repeated bad remote candidates can be marked not-a-match; sku_match_candidate_rejections suppresses the remote key from future automated ranking/search for the connection without rewriting remote SKUs or live aliases
      - umbrella storefronts can review canonical rows from every org in client_store_connection_org_coverage; each row and preview shows canonicalOrgName/canonicalOrgId before staff accept
      - direct persist_sku_match calls reject variants whose product org is not covered by the selected connection, so non-UI callers cannot bypass the action-layer coverage check

