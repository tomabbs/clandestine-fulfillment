updated_at: 2026-04-24  # HRD-35 OAuth callback now auto-registers the four Shopify webhook topics + persists granted scopes immediately after token capture (`src/app/api/oauth/shopify/route.ts`). Token-exchange response's `scope` field is split + persisted as `metadata.shopify_scopes[]`; `app_distribution` is set to `custom` when the install used per-connection Custom-distribution app credentials (state.connectionId set) and `public` when it used the env-fallback path. The same `persistWebhookRegistrationMetadata` helper is now shared by the staff-manual `registerShopifyWebhookSubscriptions` Server Action and the OAuth callback so the persisted shape is identical across the two entry points. Auto-register failures land on `metadata.webhook_register_failures[]` (or `metadata.webhook_register_error` for transport throws) and surface via the success-redirect query string `webhook_register=partial|error` — they do NOT abort the install (token still captured + persisted; staff can re-run via the existing manual button). Behavior change goes LIVE on next `git push` (route handlers ship with the next Vercel deploy, no Trigger redeploy needed).

prior_update: 2026-04-23  # Phase 5 Bandcamp polarity inversion landed in `bandcamp-shipping-verify`. Per-workspace `workspaces.bc_verify_direct_primary` flag (HRD-11, migration `20260422000001_direct_shopify_metadata.sql`) selects between LEGACY mode (SS connector primary, 30-min wait, `bandcamp.connector_fallback` warning when SS didn't push) and DIRECT-PRIMARY mode (drops the `shipstation_marked_shipped_at IS NOT NULL` filter, only requires 5-min created-at grace, `bandcamp.direct_primary_push` healthy when we push). Two SELECT queries (legacy + direct-primary) merged in app code; `not("workspace_id", "in", ...)` excludes flipped workspaces from the legacy path so a workspace can never be processed under both polarities in the same run. Per-workspace sensor row replaces the old "first workspace gets the global tally" hack. NEW Server Action `flipBandcampPrimaryToDirect` (HRD-11.1, `src/actions/bandcamp.ts`) hard-checks `workspaces.shipstation_sync_paused=true` AND zero SS-marked BC shipments in last 48h before flipping; `force=true` bypasses both with audit trail (`bandcamp.polarity_flip` warning sensor + `warehouse_review_queue` row). Disable direction always allowed (rollback path). Behavior change LIVE on next `npx trigger.dev deploy`.

prior_update: 2026-04-22  # Direct-Shopify cutover Phase 3 handlers landed in `process-client-store-webhook`: handleInventoryUpdate now resolves Shopify `inventory_item_id` → SKU via `client_store_sku_mappings.remote_inventory_item_id` (HRD-03), enforces HRD-05 wrong_location guard against the connection's `default_location_id`, surfaces missing mappings as `status='sku_mapping_missing'`. NEW handleRefund (Shopify `refunds/create`, only `restock_type='return'` re-credits, HRD-07.2 empty-array defense, lookup via `warehouse_order_items.shopify_line_item_id`) and handleOrderCancelled (re-credits all line items, marks `fulfillment_status='cancelled'`, idempotent on second delivery via `cancel:` correlation prefix). Bonus fix: handleOrderCreated now populates `warehouse_order_items.shopify_line_item_id` from `li.id` so the refund/cancel handlers can resolve back. Topic dispatcher reordered so `orders/cancelled` and `refunds/create` route correctly. Behavior change goes LIVE on next `npx trigger.dev deploy`; until Northern Spy `do_not_fanout=false` flips, no client-facing impact.

prior_update: 2026-04-20  # Org-id backfill on warehouse_products (1,533 NULL → 0) and inventory master XLSX export workbook for the upcoming physical inventory pass; both operator-only scripts, no UI.

prior_update: 2026-04-20  # Shopify webhook workspace-first stabilization + operating-model alignment: first-party `/api/webhooks/shopify` now resolves tenant via `X-Shopify-Shop-Domain` against `SHOPIFY_STORE_URL`, records resolver trace in `webhook_events.metadata`, and runs observe-only for inventory/order topics (`ignored_shipstation_authoritative`) because ShipStation is authoritative for order/inventory movement. `process-shopify-webhook` remains available for controlled replay/future re-enable with explicit in-workspace statuses.

prior_update: 2026-04-20  # Inventory-master backfill (operator scripts, no new UI): 115 stale-sheet `no_match` SKUs imported via scripts/import-missing-skus.ts (--apply --create-orgs) → 73 warehouse_products + 100 variants + 73 Shopify drafts tagged `import:inventory-master:2026-04-20`; 281 NULL format_name resolved to zero via scripts/backfill-format-name.ts (priority: format SKU prefix → title keyword → bandcamp_type_name → category SKU prefix → XLSX cross-ref → Shopify product_type). Both scripts dry-run by default with CSV plans in reports/finish-line/{import-plans,format-backfill}/. Inventory page format column now fully populated.

prior_update: 2026-04-18  # Saturday Workstream 3 (2026-04-18): added inventory_count_session + warehouse_locations_source_of_truth journeys (per-SKU count sessions with fanout suppression + cycle_count delta on completion; one-way mirror of warehouse_locations to ShipStation v2 via inline create + bulk-create-locations Trigger task; inline locator typeahead inside the existing /admin/inventory expanded-row detail). Saturday Workstream 2 (2026-04-18): added manual_inventory_count_entry journey (bulk table editor at /admin/inventory/manual-count, ShipStation v2 sibling task, hard-block + review queue on negative counts). Saturday Workstream 1 (Phase 6 closeout): added megaplan_verification journey.

