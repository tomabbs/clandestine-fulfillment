updated_at: 2026-05-06  # Preorder dashboard live Bandcamp evidence pass. Upcoming Releases now prefers Bandcamp package titles (for example the distinct `Compact Disc` vs limited LP package title), links rows to Bandcamp, derives format from SKU before stale variant metadata, and shows live Bandcamp `get_orders` order counts/units with sample `BC-{payment_id}` numbers when available. Prior update preserved below.
prior_update: 2026-05-06  # Preorder dashboard demand/link pass. Upcoming Releases now links each mapped row to Bandcamp, displays SKU-derived format ahead of stale variant format metadata, and shows pending order count plus pending unit count from synced local order rows. Live Bandcamp Sales/Merch API calls stay in sync tasks, not the dashboard render path. Prior update preserved below.
prior_update: 2026-05-06  # Preorder dashboard integration pass. Staff now use Upcoming Releases as the single operational future-preorder list, with SKU, format, release date, pending units, and available stock per row. Bandcamp Product Detection no longer duplicates valid upcoming preorders; it stays focused on missing-from-Upcoming-Releases exceptions, recent/listed Bandcamp evidence, and stale historical signals. Prior update preserved below.
prior_update: 2026-05-06  # Bandcamp preorder dashboard rows now show format metadata. Staff can distinguish LP/CD/cassette/apparel variants directly in Upcoming Releases and Bandcamp Product Detection rows, sourced from `warehouse_product_variants.format_name` with Bandcamp type as a detection-only fallback. Prior update preserved below.
prior_update: 2026-05-06  # Bandcamp preorder visibility clarified after Aliamo validation. Staff dashboard now shows future Bandcamp preorder scrape signals in an explicit "Upcoming Bandcamp preorders" section instead of hiding valid future releases from the recent/listed bucket, and the variant-authoritative Upcoming Releases card looks 90 days ahead so releases such as `Where the Echoes Bloom` remain visible before the final 30-day window. Prior update preserved below.
prior_update: 2026-04-29  # Order Pages Transition (separate Direct + ShipStation Mirror surfaces) is an operator journey. `/admin/orders` renders either Direct Orders or the ShipStation Mirror cockpit from `workspaces.flags.orders_route_mode`; `/admin/orders/shipstation` is the stable mirror URL. Direct Orders expose items, shipments, tracking events, writebacks, mirror links, and fulfillment holds; `/admin/orders/diagnostics` owns route-mode flips, order identity backfill, bridge tasks, parity counts, and Pirate Ship mislink diagnostics. Order-cache invalidation is centralized through `invalidateOrderSurfaces({workspaceId, kinds})`, `/admin/orders/holds` retains release ownership, and platform fulfillment writebacks record line-grain statuses. Prior update preserved below.
prior_update: 2026-05-06  # Bandcamp dashboard date journey clarified. Staff should read Upcoming Releases for release dates; the Product Detection card only shows recent listing/release evidence with source labels. Future-release preorders no longer appear in the recent/listed bucket based on their Bandcamp listing date, preventing April `new_date` values from looking like release dates for June preorders. Prior update preserved below.
prior_update: 2026-05-06  # Bandcamp preorder ingest journey hardened. For Aliamo `Where the Echoes Bloom`, live scraping and the Leaving Records Merch API both exposed the preorder, but no dashboard row appeared because unmatched package creation failed before `bandcamp_product_mappings` insert on a stale `warehouse_products.image_url` payload. Operators can now expect unmatched Bandcamp packages to create DB rows before Shopify using only supported product columns, with artwork in `warehouse_product_images`; the dashboard can only classify releases after this mapping row exists. Prior update preserved below.
prior_update: 2026-05-06  # Staff dashboard now includes a Bandcamp Product Detection card. Operators can see recent Bandcamp products whose Bandcamp `release_date` / `new_date` falls in the last 30 days, upcoming Bandcamp preorder scrape signals, stale historical preorder flags, and any current-upcoming Bandcamp signal that is missing from the variant-authoritative Upcoming Releases card. Recently imported mappings for old Bandcamp catalog items do not count as new products. This gives the manual Bandcamp preorder check a dashboard target without changing preorder release operations. Prior update preserved below.
prior_update: 2026-05-06  # Inventory sync cutover journey now has operator tooling for readiness and baseline import. Staff run the inventory-sync preflight before unpausing fanout, import physical count workbooks through the baseline importer with fanout suppressed, use a documented sales-freeze or movement-replay count window, create label orders as real inventory-moving orders, and see client portal safety stock as staff-managed/read-only. Critical Redis/Postgres drift automatically pauses fanout and blocks per-SKU pushes until resolved. Prior update preserved below.
prior_update: 2026-05-06  # SKU matching accepted matches now remain visible as saved aliases even if Shopify readiness is incomplete. Leaving Records had active mapping/event rows, but missing default_location_id made the summary show Matched=0; the journey now counts active aliases separately from readiness warnings and verifies the active row after save. Prior update preserved below.
prior_update: 2026-05-06  # SKU matching review now uses warehouse format as authoritative and title-token overlap for non-ID matches: LP/Vinyl share one family, CS/Cassette share one family, CD/Compact Disc share one family; stale variant text like "BLUE CASSETTE" can no longer make an LP row look like cassette. Prior update preserved below.
prior_update: 2026-05-06  # SKU matching Refresh button now visibly re-runs the server workspace/ranker: dynamic route, cache-busting `refresh=<timestamp>` navigation, pending spinner, and local optimistic state reset. Prior update preserved below.
prior_update: 2026-05-06  # SKU matching review now flags obvious physical-medium mismatches (vinyl family vs cassette/CD/digital/apparel) before staff accept. Exact SKU/barcode can still appear as evidence, but `physical_format_mismatch` candidates sort behind same-score non-mismatches and render as conflicts for review. Prior update preserved below.
prior_update: 2026-04-28  # Operational cutover journeys: documented staff fulfillment surfaces (`/admin/orders` → unified ShipStation cockpit when flagged, `/admin/inventory/manual-count`, `/admin/shipping`) aligned with TRUTH_LAYER § Operational cutover semantics + RELEASE_GATE staging smoke; integration proof `tests/integration/persist-sku-match-org-coverage.test.ts`. Prior: Umbrella SKU Matching omit/?orgId= merges vs narrows coverage orgs.
prior_update: 2026-04-28  # Woo SKU matching catalog review no longer false-times out at 20s for Northern Spy. Staff opening `/admin/settings/sku-matching` against a slow WooCommerce catalog now gets the extended Woo fetch budget needed for the remote catalog status to resolve instead of immediately showing `timeout after 20000ms`. Prior update preserved below.
prior_update: 2026-04-28  # WooCommerce connection repair journey. Operators can use `/admin/settings/store-connections` to see the Woo webhook callback URL, required topics, last webhook, last successful poll, and poll failure count. Incoming Woo webhooks are only processed after signature verification; misconfigured or invalid deliveries are logged with explicit statuses instead of silently enqueueing bad data. Woo order ingestion is resilient to webhook/poll races via a shared idempotency key and remote-modified reconciliation. Polling can still read orders while outbound fanout is dormant, and Woo stock webhooks only decrement/update inventory when an active SKU mapping exists; unmapped stock updates land in the review queue for staff mapping. Prior update preserved below.
prior_update: 2026-04-28  # Support launcher refresh behavior fixed. The floating admin/portal support chat starts minimized on every page load, does not restore an open state from localStorage/sessionStorage, and does not auto-open when unread support messages arrive; unread activity remains visible through the badge/pulse cue until the user opens it. Prior update preserved below.
prior_update: 2026-04-28  # SKU matching review drawer now has a manual remote catalog search workflow. Staff can search by title/SKU/artist/barcode/product ID, preview a selected remote product/variant, confirm it as a manual match through `persist_sku_match`, and suppress a bad repeated remote candidate via `sku_match_candidate_rejections` so it stops ranking across the connection. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching Accept/Confirm fix verified by browser smoke. The live alias scope trigger no longer dereferences missing `client_store_sku_mappings.org_id`, so `persist_sku_match` succeeds for Accept best match and Confirm match. Accept errors now show once at page level instead of also tripping the row action fallback. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching navigation performance hardening. Workspace load no longer performs per-row Shopify location-readiness GraphQL checks; it parallelizes independent bootstrap reads and defers stocked-at-default-location checks to the selected-row preview drawer. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching Server Action boundary hardening. Preview responses, Accept inputs, Confirm inputs, bulk-accept inputs, deactivate inputs, and Shopify activation inputs are JSON-plain at the client/action boundary; accept paths use an internal preview helper so no exported Server Action payload is re-entered server-side. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching review repair. Candidate identity is stable across workspace load, preview, accept, and bulk accept through the shared fingerprint helper; Bandcamp URL selection is deterministic; remote target lookup is ordered and connection-scoped; SKU-less multi-variant product-only matches produce an operator-blocking ambiguity error. The client clears stale connection/query/dialog/error state on client switches, renders dense rows without clipping below 2000 rows, and shows visible Accept/Confirm failures. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching confirm/accept now sanitizes both sides of the Server Action boundary. The client sends JSON-plain payloads to `createOrUpdateSkuMatch()`, and the action returns a JSON-plain `persist_sku_match` result, preventing React Server Action serialization errors for both "Accept best match" and preview-drawer "Confirm match". Prior update preserved below.
prior_update: 2026-04-27  # SKU matching review now includes visual comparison links. Staff can open the Shopify storefront product URL (from the Shopify product handle in the remote catalog) and the Bandcamp product URL (from `bandcamp_product_mappings.bandcamp_url`) directly from the row linked-ID section and preview drawer before confirming an alias. Prior update preserved below.
prior_update: 2026-04-27  # Client-store order create + poll backfill now run autonomous hold evaluation. After `warehouse_order_items` insert, both `process-client-store-webhook` (`orders/create`, `source: "webhook"`) and `client-store-order-detect` (`source: "poll"`) call `runHoldIngressSafely` — same helper and DB state yields the same hold decision (SKU-AUTO-3). When a hold applies, the RPC reserves committable lines in `inventory_commitments` in the same transaction as the hold stamp (SKU-AUTO-21); the webhook path skips duplicate `commitOrderItems` and only decrements inventory for committable remote SKUs, then may enqueue `send-non-warehouse-order-hold-alert`. Poll path applies holds and enqueues alerts but does not decrement warehouse inventory (webhook remains canonical for stock on poll-discovered orders). Fail-open: hold pipeline errors return a legacy verdict and emit `sensor_readings` warnings. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching Phase 7 rollout telemetry + sign-off surface live. Staff reach `/admin/settings/sku-matching/rollout` (gated on `sku_autonomous_ui_enabled`) and see five panels driven by `getAutonomousRolloutHealth()`: emergency pause (reading `workspaces.sku_autonomous_emergency_paused` with `paused_at`/`paused_by`), flag posture (the five `sku_autonomous_*` flags), weekly telemetry (latest `sensor_readings` row for `sku_autonomous.telemetry` — demotion rate, hold_released band, client alerts, promotion rate band, decision audit completeness, run failure rate, each with PASS/TRIP badges and reason codes), Bandcamp linkage readiness (the Phase 7 linkage/verified/option-rate thresholds via `compute_bandcamp_linkage_metrics`), and canary review status (the latest `warehouse_review_queue` row in category `sku_autonomous_canary_review`). The canary panel wires TWO mutations via `useTransition` + `router.refresh()`: **Open canary review** opens a new review (default `intended_flag='sku_live_alias_autonomy_enabled'`, operator-editable title/note) and **Resolve** marks an open review resolved with an optional resolution note — the resolve path revalidates `/admin/settings/sku-matching/rollout` + `/admin/settings/feature-flags` and invalidates the workspace flag cache so the next `flipAutonomousMatchingFlag` preflight sees the resolved row immediately. The weekly Trigger task `sku-autonomous-telemetry` (cron `0 8 * * 1`) keeps the sensor row fresh and, when a threshold trips, upserts a `warehouse_review_queue` row keyed to the ISO-week so staff see the specific reason codes they need to remediate. Emergency pause suppresses review queue spam but NEVER suppresses the sensor row itself — observability stays live during incidents. The rollout page is the evidence-gathering + sign-off stage; flag flips themselves still happen on `/admin/settings/feature-flags` through the SKU-AUTO-19-enforced `flipAutonomousMatchingFlag` action. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching Phase 6 admin + portal audit surfaces live. Staff reach `/admin/settings/sku-matching/autonomous-runs` and `/admin/settings/sku-matching/identity-matches` (both gated on `sku_autonomous_ui_enabled`) to read `sku_autonomous_runs` / `sku_autonomous_decisions` and `client_store_product_identity_matches` / `sku_outcome_transitions` with filters, pagination, and a detail drawer rendering `evidence_snapshot` plus a reverse-chronological transition timeline. `/admin/orders/holds` is the single resolution surface for `warehouse_orders.fulfillment_hold='on_hold'` rows — staff pick a resolution code (one of the five SKU-AUTO-17 whitelist values), append a mandatory note on `staff_override`, and can bulk-resolve multiple orders with a shared code/note. The flip of `sku_identity_autonomy_enabled` and `sku_live_alias_autonomy_enabled` ON is no longer a raw feature-flags edit — it goes through `flipAutonomousMatchingFlag` which preflights a resolved `warehouse_review_queue` row of category `sku_autonomous_canary_review` and, for the live-alias flag, the Phase 7 Bandcamp linkage thresholds plus `sku_autonomous_emergency_paused=false`. Clients whose workspace has `client_stock_exception_reports_enabled` see `/portal/stock-exceptions` — a read-only feed of `outcome_state='client_stock_exception'` rows so they can correct mis-listed availability on their storefront before oversells ship. Prior update preserved below.
prior_update: 2026-04-25  # SKU matching review journey live. Staff open `/admin/settings/sku-matching`, pick one client-store connection at a time, inspect canonical warehouse variants beside ranked Shopify / WooCommerce / Squarespace candidates, review existing SKU-conflict overlays plus Discogs identity context, and confirm alias-style matches without rewriting remote SKUs. The review drawer enforces fingerprint-based stale-review protection and surfaces Shopify readiness (`default_location_id`, `remote_inventory_item_id`, stocked-at-default-location) before an accepted alias is treated as operational; non-ready Shopify rows can be activated at the default location from the same drawer. Weekly telemetry now summarizes workspace-load latency, preview/accept ratios, and conflict growth into `sensor_readings`, with review-queue escalation when rollout safety regresses. Prior update preserved below.
prior_update: 2026-04-25  # Support Inbox DB evidence patch: `/admin/support` now shows total ticket/message counts, latest-message timestamp, DB loaded timestamp, and per-thread message counts. Resolved queue badges now count resolved tickets by queue membership (`status='resolved'`) instead of `resolved_at`-today, so imported support rows no longer appear in the list with a zero queue badge. Prior update preserved below.
prior_update: 2026-04-25  # Support Inbox 2.0 journey live. Staff now work `/admin/support` as a triage inbox with computed queues, SLA health, assignment/category/priority/snooze/resolution controls, client context, internal notes, saved replies, duplicate candidate review, and delivery failure visibility. Portal + launcher copy now use client-friendly next-action language, and the launcher keeps granular Realtime scoped to the active detail thread. Prior update preserved below.
prior_update: 2026-04-27  # WooCommerce + Squarespace connection review is now catalog-aware. On `/admin/settings/store-connections`, the Test action validates those platforms with real catalog reads instead of shallow order/inventory checks, and the legacy non-Shopify auto-discovery path now scans full Woo/Squarespace catalogs (including Woo variations and Squarespace v2 product variants) so operators can prepare mappings with materially better coverage. Prior update preserved below.
prior_update: 2026-04-27  # Store Connections admin bootstrap now resolves entirely inside the server request scope. `/admin/settings/store-connections/page.tsx` server-loads both the connection list and org picker data, then hands them to a client child for filters/dialogs/actions. Operator-visible effect: the page no longer issues client-side read actions during initial render, so the post-Shopify-callback "Server Components render" failure path is removed while create/test/disable still refresh the screen via `router.refresh()`. Prior update preserved below.

prior_update: 2026-04-27  # Store Connections admin diagnostics hardening: `/admin/settings/store-connections` now renders a visible error alert when `getUserContext()` or `getStoreConnections()` fails instead of reusing the zero-row empty state. Operator-visible effect: real auth/query failures now surface as actionable page errors rather than the misleading "No store connections found" copy.

prior_update: 2026-04-27  # Store Connections admin list hardening: `/admin/settings/store-connections` now loads the primary connection list without a client-supplied workspace filter, and `getStoreConnections()` derives workspace scope from `requireAuth()` server-side before applying optional org/platform/status filters. Operator-visible effect: stale cached auth context can no longer blank the page with a false "No store connections found" empty state when the authenticated workspace actually has rows.

prior_update: 2026-04-27  # Phase 3 Pass 2 closeout — per-connection cutover wizard journey LIVE. NEW journey `direct_shopify_cutover_wizard` (id below) covers the legacy → shadow → direct state machine on `client_store_connections.cutover_state` from the operator's POV. Behavior loop: (1) operator opens `/admin/settings/connection-cutover`, picks a connection, clicks **Start shadow mode** — the legacy→shadow transition is gated on `do_not_fanout=false`, idempotent on already-shadow, and rejects direct→shadow as an invalid transition; (2) every subsequent `client-store-push-on-sku` execution against this connection now writes to `connection_shadow_log` via `recordShadowPush()` AND enqueues the delayed `shadow-mode-comparison` Trigger task — ShipStation continues to mirror in parallel, so the storefront sees identical writes from both paths, decoupling cutover risk from production traffic; (3) the diagnostics card refreshes from `getCutoverDiagnostics(connectionId)` showing 7-day match rate / drifted / unresolved / comparison_skipped counters, recent drift samples (cap 25), and the gate evaluation `{ eligible, gate_reason ∈ ['ok','wrong_state','insufficient_samples','match_rate_below_threshold'] }`; (4) once the gate flips to `eligible` (≥ 99.5% match across ≥ 50 resolved samples), operator clicks **Cutover to direct**, optionally checking **Force** + supplying a reason ≥ 8 chars to bypass the gate for known cases — `runConnectionCutover()` re-checks the three gates server-side (state == shadow, diagnostics eligible || force, no `external_sync_events.status='in_flight'` for this connection's sync system in the last 5 min), inserts the `connection_echo_overrides` audit row FIRST (carries the diagnostics snapshot + operator id + force reason in `metadata`), then flips `cutover_state='direct'` — this ordering is load-bearing because a crash between writes leaves the connection in `shadow` with an active override (safe + auto-recoverable, not direct-without-override); (5) at any time the operator can supply a reason ≥ 8 chars and click **Rollback to legacy** — `rollbackConnectionCutover()` deactivates the active overrides (`is_active=false`) and reverts `cutover_state='legacy'`, idempotent on already-legacy. Skip cascades on the comparison task (`no_v2_defaults`, `v2_read_failed`) write `metadata.skip_reason` so the diagnostics surface buckets them as setup-gap rather than drift. Frozen primitives untouched — only the new wizard page, the new server actions module, the new connection-shadow-log helper, the new Trigger task, and the two-line metadata column added by migration `20260427000003_connection_echo_overrides_metadata.sql`. Behavior change LIVE on next Vercel deploy + `npx trigger.dev deploy`. Safety-stock workspace hotfix 2026-04-24: inline numeric edits now stage immediately on change so the pending-count badge and page-level Save button react before blur; blur/Escape still normalize invalid drafts back to the last valid saved/staged value.

prior_update: 2026-04-23  # Resend inbound support-email pipeline restored. Audit found nine bugs that silently dropped every inbound email since 2026-04-01 (470 webhook_events stuck `enqueued` with zero `support_conversations` created from email). Fix bundle R-1..R-7: (R-1) `inboundEmailWebhookSchema` rewritten to match Resend's actual envelope shape — `to/cc/bcc` are `z.array(z.string())`, `text` removed (envelope is body-less), `email_id` becomes the join key; (R-2) NEW `fetchInboundEmail(emailId)` calls `resend.emails.receiving.get` to fetch body + headers + attachments; (R-3) `webhook-events-recovery-sweep` filtered to `platform IN ('shopify','woocommerce','squarespace')` so it stops re-firing Resend / EasyPost / AfterShip rows at `process-client-store-webhook` (which masked the original failure as `status='enqueued'`); (R-4) NEW `pickRealFrom()` recovers the original sender from `X-Original-From` > `X-Forwarded-For` > `Reply-To` > `Return-Path` > `From` > envelope, surviving the Workspace forward that rewrites every inbound `from` to `orders@clandestinedistro.com`; (R-5) `warehouse_review_queue` insert uses correct `category`/`metadata` columns (was `source`/`payload`, both nonexistent — every Strategy-3 unmatched-email insert was failing); (R-6) outbound `/api/webhooks/resend` dedup insert switched from `payload` to `metadata` (broke deduplication on every bounce/complaint retry); (R-7) workspace selection adds `ORDER BY created_at ASC LIMIT 1` to make tenant assignment deterministic. Routing logic split out to `src/lib/server/resend-inbound-router.ts` so the new `scripts/_replay-resend-inbound.ts` can replay the 470 stuck rows after deploy. Bug-9 fix: non-duplicate `webhook_events` insert errors now Sentry-capture and return 500 (was silent 200, hiding all schema drift). Behavior change goes LIVE on next Vercel deploy; replay is a one-shot operator script.

prior_update: 2026-04-22  # Direct-Shopify cutover Phase 5+6+7 finish-line delivered. (F-1 / HRD-08.1) handleOrderCancelled now recredits per-line `qty - fulfilled_quantity` instead of full-line, with `db_webhook_disagree` telemetry when DB and webhook payload disagree (DB wins). (F-2 / HRD-23) every webhook Route Handler under `src/app/api/webhooks/**/route.ts` exports `runtime='nodejs'` + `dynamic='force-dynamic'` and `scripts/check-webhook-runtime.sh` enforces this in CI. (F-3 / F-4) `src/lib/server/webhook-body.ts` exports `interpretDedupError(err)` returning a typed `DedupResult`; the client-store Route Handler maps `transient` to HTTP 503 and persists `webhook_events.dedup_key` (Squarespace + any header-less platform falls back to `canonicalBodyDedupKey`). (F-5 / HRD-10) Shopify install verifies `shop.myshopifyDomain` against the normalized `shop` query param before persisting the token; mismatches upsert a `warehouse_review_queue` row keyed `shop_token_mismatch:{org_id}:{shop}` and persist `client_store_connections.shopify_verified_domain` on success. (B-1) `bandcamp-order-sync-cron` tightened to `*/15 * * * *` with global cron-level `idempotencyKeys.create` + per-order `bandcamp:order-sync:{band_id}:{order_id}` keys; overlap collapses emit `sensor_readings { sensor_name:'bandcamp.cron_idem_skip' }` per workspace. (B-2 / HRD-28) `mark-platform-fulfilled` migrated from Shopify REST to GraphQL `fulfillmentCreate`; `selectFulfillmentOrder` filters to `OPEN/IN_PROGRESS` and tie-breaks oldest GID with a sensor warning; `runFulfillmentCreateMutation` treats both `errors[]` and `userErrors[]` as failure and records the raw payload to the review-queue metadata. (B-3 / HRD-14) `/admin/channels` now renders `<ClientStoreWebhookHealthCard />` per Shopify connection — freshness clock from `client_store_connections.last_webhook_at` (1h/6h healthy/delayed/stale), per-required-topic counters from `client_store_connections.webhook_topic_health`, and an idempotent "Re-register webhooks" button driven by `diffWebhookSubscriptions`. (B-4 / HRD-15) `megaplan-spot-check` adds Shopify-direct as a 5th data source with `MAX_SHOPIFY_DIRECT_PROBES_PER_CONNECTION=50` per-connection batching; `classify` adds `legacy_drift` (informational) and `bandcamp_drift` states and treats Shopify-direct mismatches >2 as immediate `drift_major`. New gate suite `scripts/check-release-gates.sh` (HRD-08.1, HRD-23, HRD-10, HRD-35.3 + finish-line schema columns + env flags) wired to a new GitHub Actions `release-gate-check` job on `main`. Behavior changes go LIVE on next `npx trigger.dev deploy` + Vercel deploy.

prior_update: 2026-04-24  # HRD-35 OAuth callback now auto-registers the four Shopify webhook topics + persists granted scopes immediately after token capture (`src/app/api/oauth/shopify/route.ts`). Token-exchange response's `scope` field is split + persisted as `metadata.shopify_scopes[]`; `app_distribution` is set to `custom` when the install used per-connection Custom-distribution app credentials (state.connectionId set) and `public` when it used the env-fallback path. The same `persistWebhookRegistrationMetadata` helper is now shared by the staff-manual `registerShopifyWebhookSubscriptions` Server Action and the OAuth callback so the persisted shape is identical across the two entry points. Auto-register failures land on `metadata.webhook_register_failures[]` (or `metadata.webhook_register_error` for transport throws) and surface via the success-redirect query string `webhook_register=partial|error` — they do NOT abort the install (token still captured + persisted; staff can re-run via the existing manual button). Behavior change goes LIVE on next `git push` (route handlers ship with the next Vercel deploy, no Trigger redeploy needed).

prior_update: 2026-04-23  # Phase 5 Bandcamp polarity inversion landed in `bandcamp-shipping-verify`. Per-workspace `workspaces.bc_verify_direct_primary` flag (HRD-11, migration `20260422000001_direct_shopify_metadata.sql`) selects between LEGACY mode (SS connector primary, 30-min wait, `bandcamp.connector_fallback` warning when SS didn't push) and DIRECT-PRIMARY mode (drops the `shipstation_marked_shipped_at IS NOT NULL` filter, only requires 5-min created-at grace, `bandcamp.direct_primary_push` healthy when we push). Two SELECT queries (legacy + direct-primary) merged in app code; `not("workspace_id", "in", ...)` excludes flipped workspaces from the legacy path so a workspace can never be processed under both polarities in the same run. Per-workspace sensor row replaces the old "first workspace gets the global tally" hack. NEW Server Action `flipBandcampPrimaryToDirect` (HRD-11.1, `src/actions/bandcamp.ts`) hard-checks `workspaces.shipstation_sync_paused=true` AND zero SS-marked BC shipments in last 48h before flipping; `force=true` bypasses both with audit trail (`bandcamp.polarity_flip` warning sensor + `warehouse_review_queue` row). Disable direction always allowed (rollback path). Behavior change LIVE on next `npx trigger.dev deploy`.

prior_update: 2026-04-22  # Direct-Shopify cutover Phase 3 handlers landed in `process-client-store-webhook`: handleInventoryUpdate now resolves Shopify `inventory_item_id` → SKU via `client_store_sku_mappings.remote_inventory_item_id` (HRD-03), enforces HRD-05 wrong_location guard against the connection's `default_location_id`, surfaces missing mappings as `status='sku_mapping_missing'`. NEW handleRefund (Shopify `refunds/create`, only `restock_type='return'` re-credits, HRD-07.2 empty-array defense, lookup via `warehouse_order_items.shopify_line_item_id`) and handleOrderCancelled (re-credits all line items, marks `fulfillment_status='cancelled'`, idempotent on second delivery via `cancel:` correlation prefix). Bonus fix: handleOrderCreated now populates `warehouse_order_items.shopify_line_item_id` from `li.id` so the refund/cancel handlers can resolve back. Topic dispatcher reordered so `orders/cancelled` and `refunds/create` route correctly. Behavior change goes LIVE on next `npx trigger.dev deploy`; until Northern Spy `do_not_fanout=false` flips, no client-facing impact.

prior_update: 2026-04-20  # Org-id backfill on warehouse_products (1,533 NULL → 0) and inventory master XLSX export workbook for the upcoming physical inventory pass; both operator-only scripts, no UI.

prior_update: 2026-04-20  # Shopify webhook workspace-first stabilization + operating-model alignment: first-party `/api/webhooks/shopify` now resolves tenant via `X-Shopify-Shop-Domain` against `SHOPIFY_STORE_URL`, records resolver trace in `webhook_events.metadata`, and runs observe-only for inventory/order topics (`ignored_shipstation_authoritative`) because ShipStation is authoritative for order/inventory movement. `process-shopify-webhook` remains available for controlled replay/future re-enable with explicit in-workspace statuses.

prior_update: 2026-04-20  # Inventory-master backfill (operator scripts, no new UI): 115 stale-sheet `no_match` SKUs imported via scripts/import-missing-skus.ts (--apply --create-orgs) → 73 warehouse_products + 100 variants + 73 Shopify drafts tagged `import:inventory-master:2026-04-20`; 281 NULL format_name resolved to zero via scripts/backfill-format-name.ts (priority: format SKU prefix → title keyword → bandcamp_type_name → category SKU prefix → XLSX cross-ref → Shopify product_type). Both scripts dry-run by default with CSV plans in reports/finish-line/{import-plans,format-backfill}/. Inventory page format column now fully populated.

