      - candidate selection by tier — hot = warehouse_inventory_levels.available <= HOT_LOW_STOCK_THRESHOLD (10) UNION warehouse_inventory_activity rows where delta < 0 in last 24h; warm = 30-day negative-delta SKUs; cold = full per-workspace catalog
