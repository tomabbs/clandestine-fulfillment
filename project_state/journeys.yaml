  - id: shipstation_ship_notify_inventory
    area: inventory
    description: ShipStation SHIP_NOTIFY → inventory decrement → Bandcamp/client store fanout (Phase 2, 2026-04-13)
    paths:
      - src/app/api/webhooks/shipstation/route.ts
      - src/trigger/tasks/process-shipstation-shipment.ts
      - src/lib/clients/shipstation.ts
      - src/lib/clients/shipstation-inventory-v2.ts
      - src/lib/server/record-inventory-change.ts
      - src/trigger/lib/match-shipment-org.ts
      - tests/unit/webhooks/shipstation-webhook.test.ts
      - tests/unit/trigger/process-shipstation-shipment.test.ts
      - tests/unit/lib/clients/shipstation-inventory-v2.test.ts
    status: green
    checks:
      - route handler verifies x-ss-signature against SHIPSTATION_WEBHOOK_SECRET on raw req.text() body (Rule #36/#63)
      - dedup via webhook_events UNIQUE(platform, external_webhook_id) keyed shipstation:ship_notify:{resource_url} (Rule #62)
      - returns 200 in <500ms; heavy work delegated to process-shipstation-shipment task (Rule #66)
      - processor pinned to shipstation queue (concurrencyLimit 1) and validates resource_url host = ssapi.shipstation.com (SSRF defense)
      - voided shipments are skipped without org match or inventory write
      - matchShipmentOrg() unresolvable → review queue severity:high, shipment blocked (no partial inventory writes against unknown org)
      - findVariantBySkuOrAlias() resolution tiers — direct sku → client_store_sku_mappings.remote_sku → sku_remap_history.from_sku
      - unknown SKU per line item → review queue severity:medium, other line items in same shipment continue (per-line failure isolation)
      - inventory write goes through recordInventoryChange() with source:shipstation, correlationId ssv1:shipment:{id}:{sku}, metadata.source_subtype:ship_notify
      - idempotency on retry via Redis SETNX guard (Rule #47) and warehouse_inventory_activity (sku, correlation_id) UNIQUE in record_inventory_change_txn
      - Bandcamp / client store fanout happens automatically inside recordInventoryChange — processor never calls APIs directly (Rule #48)
      - markWebhookEvent merges (does not clobber) the metadata payload set by the route handler when updating status

  - id: shipstation_v2_inventory_batch_only
    area: integrations
    description: ShipStation v2 inventory client enforces batch-only reads (Phase 2, 2026-04-13)
    paths:
      - src/lib/clients/shipstation-inventory-v2.ts
      - scripts/check-v2-inventory-batch.sh
      - scripts/release-gate.sh
    status: green
    checks:
