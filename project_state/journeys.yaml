      - src/lib/server/sku-autonomous-dry-run.ts
      - src/trigger/tasks/sku-autonomous-dry-run.ts
    status: green
    checks:
      - rollout page renders a "disabled" stub until the workspace flips sku_autonomous_ui_enabled
      - bootstrap is a single getAutonomousRolloutHealth() read on the server; partial failure surfaces typed error markers per panel instead of failing the whole page
      - weekly sku-autonomous-telemetry task (cron 0 8 * * 1) writes one sensor_readings row per workspace even while the workspace is emergency-paused (observability must not drop during incidents)
      - threshold trips upsert warehouse_review_queue rows keyed by ISO-week so a reason tripping multiple weeks is one row per week — emergency pause suppresses queue writes without suppressing the sensor row
      - telemetry panel reads the latest sensor_readings row for sku_autonomous.telemetry and renders PASS/TRIP badges against TELEMETRY_THRESHOLDS (max_demotion_rate, hold_released band, client alerts, promotion rate band, decision audit completeness, run failure rate)
      - linkage panel reads compute_bandcamp_linkage_metrics and evaluates the Phase 7 gates (linkage_rate ≥ 0.7 / verified_rate ≥ 0.6 / option_rate ≥ 0.4) consumed by flipAutonomousMatchingFlag's sku_live_alias_autonomy_enabled preflight
      - canary review panel renders the latest warehouse_review_queue row in category sku_autonomous_canary_review and wires create + resolve via useTransition + router.refresh()
      - resolveAutonomousCanaryReview returns alreadyResolved:true on idempotent re-call, revalidates /admin/settings/sku-matching/rollout + /admin/settings/feature-flags, and calls invalidateWorkspaceFlags() so the next flip preflight sees the resolved row
      - flag flips themselves still happen on /admin/settings/feature-flags through flipAutonomousMatchingFlag — this surface is the evidence-gathering + sign-off stage, not the flip itself
      - sku-autonomous-dry-run can be manually run before flag flips to populate dry_run=true run and decision evidence without writing identity matches, live aliases, order holds, inventory, or alert events

