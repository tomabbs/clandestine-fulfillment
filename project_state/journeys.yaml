  - id: autonomous_sku_matching_rollout
    area: admin_settings
    paths:
      - src/app/admin/settings/sku-matching/rollout/page.tsx
      - src/app/admin/settings/sku-matching/rollout/rollout-client.tsx
      - src/actions/sku-autonomous-rollout.ts
