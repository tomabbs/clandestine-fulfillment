      - drift thresholds (plan §7.1.6.1) — |drift| <= SILENT_DRIFT_TOLERANCE (1) silent auto-fix; 2 <= |drift| <= HIGH_SEVERITY_DRIFT_THRESHOLD (5) auto-fix + low-severity review row; |drift| > 5 auto-fix + high-severity review row (surfaced on Channels page)
      - auto-fix flows ALWAYS through recordInventoryChange({ source:'reconcile', correlationId:'reconcile:{tier}:{run_id}:{sku}' }) — schema migration 20260413000030 extends warehouse_inventory_activity_source_check to admit 'reconcile'
