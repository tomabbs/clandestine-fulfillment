prior_update: 2026-04-24  # Phase 5 §9.6 D1.b/c — ATP wire-up + counter recon. NEW migration `supabase/migrations/20260424000005_atp_committed_active_flag.sql` (applied to remote): adds `workspaces.atp_committed_active boolean NOT NULL DEFAULT false` — gates whether `computeEffectiveSellable()` subtracts `committed_quantity` from the push value. Default `false` preserves the pre-Phase-5 decrement-at-orders/create semantic exactly so D1.b is an additive, audit-only change at deploy; flip to `true` per workspace only AFTER the Phase 5 §9.6 D1.b.1 decrement-at-fulfillment refactor lands. UPDATED: `src/lib/server/effective-sellable.ts` (`computeEffectiveSellable` SELECT now also reads `atp_committed_active`, snapshot interface gains `workspaceAtpCommittedActive`; `evaluateEffectiveSellable` gates the `committed_quantity` subtraction on the flag and returns `committedActive` + `committedSubtracted` for diagnostic/audit observability). NEW helpers in `src/lib/server/inventory-commitments.ts`: `commitOrderItems({workspaceId, orderId, items, metadata?})` and `releaseOrderItems({workspaceId, orderId, reason, skus?})` — convenience wrappers that pin `source='order'` + `source_id={warehouse_orders.id}` so the unique partial index `uq_commitment_open_per_source_sku` dedups order-create retries automatically. WIRE-UP: `src/trigger/tasks/process-client-store-webhook.ts.handleOrderCreated` calls `commitOrderItems()` AFTER the `warehouse_order_items` insert (commit only follows a successful items insert; correlation_id-style metadata `{ platform, connection_id, remote_order_id, webhook_event_id }`); `handleOrderCancelled` calls `releaseOrderItems({ reason: 'order_cancelled' })` AFTER recrediting `available`; `src/trigger/tasks/mark-platform-fulfilled.ts` calls `releaseOrderItems({ reason: 'platform_fulfilled:{source}' })` for every platform branch AFTER the `platform_fulfillment_status='confirmed'` flip. ALL three call sites are wrapped in try/catch + `sensor_readings('inv.committed_*_failed', status='warning')` so a commit-ledger failure NEVER blocks the underlying order/cancel/fulfill — Rule #43 inventory event ordering preserved. Bandcamp commit/release deferred (sale-poll path semantically packs +sold deltas, not a real order lifecycle, and refund/preorder paths need their own design pass). NEW Trigger task `src/trigger/tasks/inventory-committed-counter-recon.ts` (`schedules.task` cron `15 4 * * *` UTC, no queue pin — read-only across all workspaces, paginates 1000-at-a-time): D1.c safety net that compares `warehouse_inventory_levels.committed_quantity` against `SUM(inventory_commitments.qty WHERE released_at IS NULL)` per `(workspace_id, sku)`. Drift opens `severity='high' warehouse_review_queue` rows (`category='inv_committed_counter_drift'`, `group_key='inv-committed-drift:{ws}:{sku}'` — UNIQUE constraint `uq_review_queue_group_key` on the column means repeats increment occurrence_count rather than spawning duplicates) AND emits per-workspace `sensor_readings('inv.committed_counter_recon')` rows (healthy/warning) for dashboard time-series charting. Drift detection runs UNCONDITIONALLY — independent of `atp_committed_active` because trigger correctness is independent of consumer-side math. NEVER auto-corrects (auto-correction would mask trigger bypass / lost write — surface the drift for forensic review, then a future D3+ "Recompute committed_quantity for SKU" admin action will run the underlying RPC under controlled conditions). Pure-data core extracted as `runInventoryCommittedCounterRecon({ supabase, reconRunId, pageSize? })` — the `schedules.task` is a thin wrapper that injects the service-role client + `ctx.run.id`. Task registered in `src/trigger/tasks/index.ts`. NEW unit tests: `tests/unit/trigger/inventory-committed-counter-recon.test.ts` (8 cases covering zero-drift→healthy sensor + zero queue rows, over-committed→drift+, under-committed→drift-, orphan ledger row→drift in the OTHER direction, multi-workspace mixed-status sensor