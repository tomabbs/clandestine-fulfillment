version: 1
updated_at: 2026-04-13

domains:
  - name: auth_and_access
    paths:
      - src/lib/server/auth-context.ts
      - src/actions/auth.ts
      - src/app/(auth)/**
      - middleware.ts
    responsibilities:
      - session resolution
      - role enforcement
      - portal/admin route protection

  - name: query_and_cache
    paths:
      - src/lib/hooks/use-app-query.ts
      - src/lib/shared/query-tiers.ts
      - src/lib/shared/query-keys.ts
      - src/lib/query-client.ts
    responsibilities:
      - canonical query wrappers
      - cache tier policy
      - invalidation contracts

  - name: staff_portal
    paths:
      - src/app/admin/**
      - src/components/admin/**
    responsibilities:
      - warehouse operations
      - client management
      - billing controls
      - integration settings
      - bundle inventory management (component tracking, availability computation)

  - name: client_portal
    paths:
      - src/app/portal/**
      - src/components/portal/**
    responsibilities:
      - inventory visibility
      - inbound submissions
      - releases
      - support and settings

  - name: server_actions
    paths:
      - src/actions/**
      - src/lib/server/bandcamp-shipping-paid.ts
      - src/lib/server/shipment-fulfillment-cost.ts
    responsibilities:
      - validated read/write boundaries
      - service role guarded mutations
      - envelope error contracts

  - name: api_routes
    paths:
      - src/app/api/**
    responsibilities:
      - webhook ingestion
      - health probes
      - provider signature validation

  - name: trigger_runtime
    paths:
      - src/trigger/tasks/**
      - trigger.config.ts
    responsibilities:
      - cron/event processing
      - asynchronous orchestration
      - resilience and retry policy

  - name: integrations
    paths:
      - src/lib/clients/**
      - src/actions/shopify.ts
      - src/actions/bandcamp.ts
      - src/actions/store-connections.ts
    responsibilities:
      - shopify/bandcamp/store sync
      - shipstation/aftership/stripe/resend wiring
      - credential and connection health
      - bandcamp scraper health dashboard (getBandcampScraperHealth)
      - bandcamp Sales Report API (backfill + daily sync)
      - bandcamp sales backfill audit log (chunk-level tracking, verified completion)
      - bandcamp genre tags (HTML scraping + taxonomy matching)
      - bandcamp trending intelligence (dig_deeper API)
      - Bandcamp order sync persists shipping paid (`warehouse_orders.shipping_cost`, `line_items[].shipping`) for fulfillment margin on shipments; `bandcamp-shipping-paid` hydrates from get_orders when the DB never stored it
      - `shipment-fulfillment-cost.ts` is the single owner of fulfillment cost computation (postage + materials + pick/pack); used by `getShipments` (batch, workspace-scoped, chunked .in()) and `getShipmentDetail` (single); returns `partial`/`unknownSkus`/`missingFormatCosts`/`skuFormatMap`; all variant and format-cost queries scoped by workspace_id; integer-cents accumulation to prevent IEEE 754 drift
      - SKU reconciliation and auto-generation
      - workspace_catalog_stats snapshot refresh
      - Shopify product sync completeness (tracking, cost, weight, collections, publishing)
      - Shopify image sync invariants: `productSetCreate` MUST use `files: [FileSetInput!]` (NOT `media`) for images in ProductSetInput (2024-10+). `storeScrapedImages` pushes Bandcamp art via `productCreateMedia`. `upsertImagesBulk` in shopify-sync hydrates `warehouse_product_images` rows with `shopify_image_id` for deduplication. `shopify-image-backfill` task repairs historical data gaps (JSONB→table backfill + Bandcamp art push for imageless products).

  - name: database_and_rls
    paths:
      - supabase/migrations/**
      - scripts/sql/**
      - docs/PROD_MIGRATION_RLS_PARITY_CHECKLIST.md
    responsibilities:
      - schema parity
      - policy correctness
      - migration traceability

  - name: quality_and_release
    paths:
      - tests/**
      - scripts/release-gate.sh
      - docs/RELEASE_GATE_CRITERIA.md
      - reports/playwright-audit/**
    responsibilities:
      - static and runtime gate checks
      - e2e diagnostics
      - release confidence criteria
