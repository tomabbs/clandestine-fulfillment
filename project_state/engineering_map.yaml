prior_update: 2026-04-24  # Phase 5 §9.6 D1 — ATP layer substrate. NEW migration `supabase/migrations/20260424000004_inventory_commitments.sql` (applied to remote — verified end-to-end by `scripts/_phase5-d1-trigger-smoke.ts` 7/7 against prod): adds `inventory_commitments` ledger (`id uuid pk`, `workspace_id` FK→`workspaces`, `sku text`, `source text CHECK ∈ {order,cart,transfer,manual}`, `source_id text`, `qty int CHECK > 0`, `committed_at`, `released_at`, `release_reason`, `metadata jsonb`, `created_at`, `updated_at`) + `warehouse_inventory_levels.committed_quantity int NOT NULL DEFAULT 0 CHECK (>= 0)` denormalized counter + lockstep trigger `sync_committed_quantity()` (AFTER INSERT/UPDATE/DELETE FOR EACH ROW; updates counter inside the SAME transaction as each ledger mutation; raises on un-release attempts and on qty mutation of open rows; uses `GREATEST(0, ...)` defensively against pathological transaction nesting; warns-not-fails if the level row is absent so a missing SKU doesn't block the ledger insert). Indexes: UNIQUE partial `uq_commitment_open_per_source_sku (workspace_id, source, source_id, sku) WHERE released_at IS NULL` (idempotency for retried `orders/create`), `idx_commitment_workspace_sku_open (workspace_id, sku) WHERE released_at IS NULL` (hot-path lookup), `idx_commitment_source_lookup (source, source_id)` (release-by-order path), `idx_commitment_released_at (released_at) WHERE released_at IS NOT NULL` (future retention sweep). RLS: `staff_all_inventory_commitments` (FOR ALL TO authenticated USING is_staff_user()); service_role bypasses RLS for Trigger tasks. Audit: pre-existing `warehouse_inventory_levels.committed integer` is a Phase 0 dormant placeholder (grep confirmed never written non-zero anywhere in `src/**`); kept in place for the Phase 5 cutover, scheduled for removal in a follow-up migration once we are confident no read path treats it as meaningful (deferred follow-up: `phase5-drop-legacy-committed-column`). NEW shared owners: `src/lib/server/inventory-commitments.ts` (canonical write helper — `commitInventory({workspaceId, source, sourceId, items: [{sku, qty}], metadata?})` and `releaseInventory({workspaceId, source, sourceId, skus?, reason})`; aggregates duplicate SKUs into one upsert row at summed qty so the partial unique index doesn't reject the second copy; filters non-positive / empty-SKU items; uses `upsert(rows, { onConflict: 'workspace_id,source,source_id,sku', ignoreDuplicates: true })` so retries are safe no-ops; reports `inserted` vs `alreadyOpen` so retries are observable; release UPDATE is scoped by `is('released_at', null)` so a duplicate cancel webhook returns `released: 0` instead of touching anything). UPDATED: `src/lib/server/effective-sellable.ts` (`computeEffectiveSellable` SELECT now reads `committed_quantity` alongside `available` and `safety_stock` so the snapshot is transactionally consistent on a single row read; `evaluateEffectiveSellable` already had `committed_quantity` plumbing from the Phase 1 prep — was returning 0 by default until the column existed). NEW probe: `scripts/_phase5-d1-trigger-smoke.ts` (live end-to-end validation against prod Supabase; picks one real (workspace, sku) with available > 0; verifies insert→counter+, dup-blocked-by-unique-index, qty-mutation-blocked-by-trigger, release→counter back to baseline, re-insert after release re-increments, un-release blocked by trigger, cleanup back to baseline; cleans up after itself). NEW unit tests: `tests/unit/lib/server/inventory-commitments.test.ts` (16 cases — aggregation, filtering, idempotency reporting, error-context, release-with-and-without-SKU-filter, no-op release semantics). Phase 5 D1 is **GA-safe and additive** — no production write path consumes `committed_quantity` yet (push helper reads it but every existing row carries 0); next sub-pass wires `commitInventory()` into the orders/create handlers (Shopify + client-store + Bandcamp + manual) and `releaseInventory()` into the orders/fulfill + orders/cancel + preorder-fulfillment paths. Rule #20 exempts `committed_quantity` because the trigger is the ONLY writer; application code never touches the column. Pre-D1 row preserved below.

prior_update: 2026-04-24  # Phase 4 Sub-pass A.x — webhook ingress burst-test harness + X-1.b Trigger.dev enqueue rate-limit characterization + operational verification + decision doc. NEW probe scripts: `scripts/_phase4-burst-test.ts` (sustained-burst harness; HMAC-signed Shopify-shaped `inventory_levels/update` payloads against prod Node ingress; modes: `burst` fixed-total / `sustained` concurrency-held-for-N-seconds; `--scale=full` matches plan §9.5 spec exactly: 50 concurrent × 60s sustained; targets Northern Spy Shopify connection `93225922-357f-4607-a5a4-2c1ad3a9beac` while `cutover_state=legacy + do_not_fanout=true` so downstream `process-client-store-webhook` is no-op via SS-authoritative routing); `scripts/_phase4-burst-cleanup.ts` (companion reaper; `--label=` glob form supports background-scheduled runs that don't know runtime-generated run_id at scheduling time; reaps `webhook_events WHERE external_webhook_id LIKE 'phase4-burst-{label}-%'` BEFORE the 5-min `webhook-events-recovery-sweep` would re-fire `enqueue_failed` rows); `scripts/_phase4-x1b-trigger-rate-limit-probe.ts` (binary-stepping concurrency probe through `[2,5,10,15,20,30,40,50]` × 10s burst with 60s recovery + auto-cleanup per step; identifies the inflection concurrency where Trigger.dev v4 `tasks.trigger()` saturates); `scripts/_phase4-x1b-historical-burst-audit.ts` (read-only 30-day analysis of production `webhook_events` arrival rates per (platform, connection_id-from-metadata); computes per-second / 60s sliding / 5-min sliding burst stats; classifies single-second peaks against X-1.b ceiling/penalty-box thresholds; auto-excludes probe traffic by `external_webhook_id LIKE 'phase4-burst-%' OR 'phase4-x1b-probe-%'`); `scripts/_phase4-x1b-status-verification.ts` (read-only operational reality check; counts `webhook_events.status` distribution over the same window to verify whether theoretical burst-rate findings match operational `enqueue_failed` reality); `scripts/_phase4-x1b-temporal-distribution.ts` (read-only per-day status matrix to detect concentrated past fires vs ongoing operational debt); `scripts/_phase4-run2-scheduler.sh` (one-shot bash scheduler for fire-at-{UTC} background runs; uses `caffeinate -i -s` to prevent macOS idle-sleep during the wait; logs to `reports/phase4-burst/run2-scheduler.log`). Reports directory `reports/phase4-burst/` houses raw `{ts}-{label}.json` + analytical `{ts}-{label}-summary.md` artifacts. **Empirical system-truth findings recorded for future agents (Run #1 + X-1.b probe, 2026-04-24):** (1) Production Node webhook ingress 200-only-path p95 = 1,507 ms vs F-7 budget 800 ms — **F-7 fails on the OK path** independent of any 503 saturation. (2) Trigger.dev v4 `tasks.trigger()` enqueue ceiling is a HARD CLIFF between concurrency 10 and 15: at conc=10 → 27.5 enqueues/sec sustained at 0% saturation, at conc=15 → 89% saturation with sustained 200-rps dropping to 6.8, at conc≥20 → 100% saturation with `ms_to_first_503=0` (penalty-box behavior — first request of each step gets 503 before anything else lands, even after 60s recovery, persisted across 4 consecutive steps; suggests rate-limit window ≥ minutes, suspected 5-min). (3) HRD-17.1 graceful degradation is working as designed — `enqueue_failed` 503s never drop webhooks (recovery sweep within 5 min + Shopify retries on 503 with backoff) but during the penalty-box window real-time fanout is broken. (4) Real-world headroom: single-shop scenarios (≤5 rps) safe; multi-shop simultaneous bulk-edits (5 shops × 10 SKUs in same second = 50 rps) above ceiling. **OPERATIONAL VERIFICATION REVERSED THE THEORETICAL CONCERN.** Historical audit of 30 days of production webhook_events (66,415 events): ZERO `enqueue_failed` rows ever occurred. Worst single-second peak = 30 rps (one event 2026-04-20T15:37:32 UTC, 6 total seconds above penalty-box threshold all clustered in 3 minutes); worst sustained 60s = 13.1 rps; worst sustained 5-min = 10.3 rps — all comfortably below the 27.5 rps ceiling. Production bursts are too short / too spread to consume Trigger.dev's rate-limit bucket. Bonus discovery: the 50% `parse_failed` + 34% `pending` status counts in the 30-day window were a CONCENTRATED PAST FIRE (2026-04-09 → 2026-04-20) that was DECISIVELY FIXED by the 2026-04-20 workspace-first webhook stabilization — Apr 21+ shows zero new parse_failed/pending. 5 residual `pending` stragglers from Apr 21-22 deferred to `webhook-events-post-stabilization-stragglers`. **DECISION (X-1-decision-DRAFT.md, full reasoning at `reports/phase4-burst/X-1-decision-DRAFT.md`):** Phase 4 §9.5 build (Edge migration + waitUntil + batchTrigger) is **DEFERRED** — no operational signal currently justifies the engineering investment. Re-open if any of: (1) enqueue_failed > 0 for 3+ consecutive days; (2) single-second peaks ≥30 rps in 5+ separate hours within a week; (3) sustained 60s rate ≥20 rps; (4) Vercel cold-start p95 degrades to >2,500 ms; (5) Shopify webhook subscription deactivation; (6) new platform integration adding 3-5× volume. Plan sections appended: §9.5.1 (harness + cleanup), §9.5.2 (Run #1 outcome), §9.5.3 (X-1.b probe outcome). Deferred follow-ups: `phase4-burst-run2-x1-close` (high severity, due 2026-04-26 — Run #2 fires at 16:00 UTC via background scheduler), `phase4-trigger-enqueue-saturation` (downgraded to LOW severity, due 2026-07-24, with monitoring trigger conditions), `webhook-events-post-stabilization-stragglers` (low severity, due 2026-04-30). PRODUCTION SAFETY VERIFICATION: 9,259 total `webhook_events` rows created across all probes (2,800 Run #1 + 6,459 X-1.b across 8 steps; historical/status/temporal scripts are read-only), 9,259 reaped via cleanup — zero leakage to recovery sweep — zero inventory mutations — zero outbound Shopify pushes — zero sensor alerts. NEXT BUILD STEP: pivot to Phase 5 (ATP layer + per-channel safety stock UI per plan §9.6). Pre-Phase-4 row preserved below.

prior_update: 2026-04-27  # Phase 3 Pass 2 — per-connection cutover wizard + diagnostics surface. New shared owners: `src/lib/server/connection-shadow-log.ts` (NEW — `recordShadowPush({ supabase, workspaceId, connectionId, sku, correlationId, pushedQuantity, cutoverStateAtPush, shadowWindowToleranceSeconds, metadata? })` inserts a `connection_shadow_log` row when `cutoverStateAtPush === 'shadow'` and enqueues a delayed `shadow-mode-comparison` Trigger task with idempotency-key `shadow-mode-comparison:{shadowLogId}`. Returns `skipped_not_shadow` for legacy/direct, `logged` on success, `logged_compare_skipped` on duplicate `(correlation_id, sku)` UNIQUE collision (PG `23505`) or trigger-enqueue failure — never throws so the parent push isn't aborted; Sentry-logged on transient failures); `src/trigger/tasks/shadow-mode-comparison.ts` (NEW — pinned to `shipstationQueue`; reads ShipStation v2 inventory after `shadow_window_tolerance_seconds`, persists `match` + `drift_units` to the originating `connection_shadow_log` row; skip cascades `skipped_log_missing` / `skipped_already_compared` / `skipped_no_v2_defaults` / `skipped_error` write `metadata.skip_reason` so the diagnostics surface buckets them; treats absent SKU as 0 per Phase 0 §4.2.3; runner exported separately as `runShadowModeComparison()` so tests don't depend on Trigger.dev's private `Task<>.run` surface); `src/actions/connection-cutover.ts` (NEW — `getCutoverDiagnostics(connectionId)` returns 7-day rolling counters + recent drift samples cap 25 + `comparison_skip_breakdown` + gate evaluation `{ eligible, gate_reason ∈ ['ok','wrong_state','insufficient_samples','match_rate_below_threshold'] }` against `REQUIRED_MATCH_RATE=0.995` over `MIN_SAMPLE_COUNT_FOR_CUTOVER=50`; `startConnectionShadowMode({ connectionId, shadowWindowToleranceSeconds })` flips legacy→shadow, idempotent on already-shadow, rejects `do_not_fanout=true` and direct→shadow as invalid transitions; `runConnectionCutover({ connectionId, force?, forceReason? })` enforces the three-gate cascade (state == shadow, diagnostics eligible bypassable with force=true + forceReason ≥ 8 chars, no `external_sync_events.status='in_flight'` for this connection's sync system within `IN_FLIGHT_WINDOW_MINUTES=5`); on pass inserts `connection_echo_overrides` row FIRST (audit row carries diagnostics snapshot + operator id + force reason in `metadata`) then flips `cutover_state='direct'` — order matters because a crash between writes leaves the connection in `shadow` with an active override (safe + auto-recoverable); `rollbackConnectionCutover({ connectionId, reason })` deactivates active overrides and reverts to legacy, idempotent on already-legacy, requires reason ≥ 8 chars at the Zod boundary); `src/app/admin/settings/connection-cutover/page.tsx` (NEW — operator wizard with connection picker, diagnostics panel rendering counters/gate badge/drift samples table/skip breakdown, and three transition buttons; "Cutover to direct" disabled unless `gate.eligible || (force && reason.length ≥ 8)`; sidebar entry added under Settings via `src/components/admin/admin-sidebar.tsx`). New release-gate scaffolding in `scripts/check-release-gates.sh`: C.2.3 (`idx_connection_shadow_log_retention` partial index), C.2.6 (`connection_echo_overrides.metadata` column), C.2.7 (`client_store_connections_shadow_window_check` CHECK constraint name probe) all promoted from `INFO` to active assertions. Schema: migration `20260427000003_connection_echo_overrides_metadata.sql` adds `connection_echo_overrides.metadata jsonb NOT NULL DEFAULT '{}'` (audit trail for `runConnectionCutover` invocations) and the `idx_connection_shadow_log_retention` partial index over resolved/observed rows so a future `prune-shadow-log` sweep is index-only. Tests: `tests/unit/lib/server/connection-shadow-log.test.ts` (5 cases — cutover-state guard, default + clamped delay window, duplicate (correlation_id, sku) collision returning `logged_compare_skipped`, trigger-enqueue failure swallowed via Sentry); `tests/unit/trigger/shadow-mode-comparison.test.ts` (7 cases — log missing / already compared / no v2 defaults / v2 read failure / absent SKU treated as 0 / match / drift); `tests/unit/actions/connection-cutover.test.ts` (14 cases — diagnostics counter math + 4 gate reasons, comparison skip bucketing, `startConnectionShadowMode` idempotency + dormancy + invalid-transition rejection, `runConnectionCutover` blocked branches, `rollbackConnectionCutover` no-op + reason validation). Pre-Pass-1 row preserved below.

