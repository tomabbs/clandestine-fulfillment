updated_at: 2026-04-22  # HRD-35 per-client Shopify Custom-distribution app onboarding. Schema: migration `20260422000001_direct_shopify_metadata.sql` adds `client_store_connections.default_location_id` / `shopify_app_client_id` / `shopify_app_client_secret_encrypted`, `client_store_sku_mappings.remote_inventory_item_id` + UNIQUE(connection_id, remote_inventory_item_id), `webhook_events.last_seen_at` (HRD-01), `workspaces.bc_verify_direct_primary` (HRD-11 polarity flag), generalizes `oauth_states` for OAuth 2.0 (nullable `request_token_secret`, new `connection_id` + `nonce_purpose`), and admits `inventory_activate` into `warehouse_inventory_activity_source_check` (HRD-26). Code: `src/app/api/oauth/shopify/route.ts` resolves credentials per-connection (`resolveAppCredentials(connectionId)`) with env fallback, persists state nonce in `oauth_states` (`nonce_purpose='shopify_install'`, 15min TTL, single-use SELECT-then-DELETE on callback per HRD-35.1), expanded SHOPIFY_SCOPES per HRD-25 (adds `read_locations`/`read_all_orders`/`write_merchant_managed_fulfillment_orders`; `write_webhooks` removed because it does NOT exist as a Shopify scope â€” webhook subscriptions are gated by the resource scope, e.g. `inventory_levels/update` needs `read_inventory`), and inserts `client_store_connections` rows with `do_not_fanout=true` (Phase 0.8 dormancy default). Server Actions in `src/actions/store-connections.ts`: `setShopifyAppCredentials`, `generateShopifyInstallUrl`, `listShopifyLocations`, `setShopifyDefaultLocation`. UI: `src/components/admin/configure-shopify-app-dialog.tsx` mounted at `/admin/settings/store-connections` (per-Shopify-row "Configure App" button, three-step badged flow). Type: `ClientStoreConnection` extended with `default_location_id` / `shopify_app_client_id` / `shopify_app_client_secret_encrypted` (Rule #58 â€” types live in `src/lib/shared/types.ts`); `InventorySource` adds `'inventory_activate'`. Northern Spy probe (`2b65b8-2.myshopify.com`, 2026-04-21) verified the OAuth callback end-to-end.

prior_update: 2026-04-20  # ShipStation product-import export â€” admin button + history. Owners â€” shared builder `src/lib/server/shipstation-export.ts::buildShipstationExport({ supabase, sinceTs? })` (single source of truth for the 30-column ShipStation header; CLI + Trigger task + admin button all consume it); Trigger task `src/trigger/tasks/shipstation-export.ts` (`maxDuration: 600`, generic queue â€” no external API calls; uploads CSV/XLSX/summary.json to `shipstation-exports` Storage bucket at `{workspace}/{yyyymmdd}/{runId}.{ext}`); Server Actions `src/actions/shipstation-export.ts` (`triggerShipstationExport({ mode: 'full'|'incremental' })`, `listShipstationExportRuns`, `getShipstationExportDownloadUrls` â€” returns 1h signed URLs); admin UI `/admin/settings/shipstation-export` with two buttons (Export all / Export new since last) + recent-runs table that polls every 3s while in-flight; CLI `scripts/export-shipstation-import.ts` (now a thin wrapper over the shared lib; `--since=ISO_TS` flag for incremental). Migration `20260420000006_shipstation_export_runs.sql` adds the `shipstation_export_runs` table (mode/status/since_ts/data_max_ts/coverage/duplicate_skus + Storage paths) + the `shipstation-exports` private bucket with staff-SELECT/service_role-ALL policies. Incremental mode chains via `since_ts = previous completed run.data_max_ts` (max(created_at) of variants included) â€” first incremental run with no prior history = full export. **Boolean column fix (post-import):** ShipStation's `Use Product Name` / `Active` / `Is Returnable` / `Track inventory` columns are typed boolean â€” emit literal `"true"`/`"false"`, NOT `"Yes"`/`"No"` (which silently defaults to false and prints a per-row WARNING in the import preview). SKU normalization strips U+FEFF / U+200B-D / U+2060 zero-width chars before dedup using alternation (`/\uFEFF|\u200B|\u200C|\u200D|\u2060/g` â€” `noMisleadingCharacterClass` rejects ZWJ inside a character class because it composes emoji); flagged dupes (incl. one BOM-corrupted SKU `LP-zum-025` colliding between two `Silentist - The Tunnel Vinyl Single` warehouse_products rows under vendor `Zum`) recorded in `shipstation_export_runs.duplicate_skus jsonb` and the per-run summary.json. Tests: 8 unit cases in `tests/unit/actions/shipstation-export.test.ts` cover staff gating, full-mode (`since_ts=null`), incremental fallback (no prior run), incremental chaining (uses prev `data_max_ts`), cross-workspace download protection, non-completed download rejection, and signed-URL pass-through.

prior_update: 2026-04-20  # Shopify webhook workspace-first stabilization + operating-model alignment: `src/app/api/webhooks/shopify/route.ts` now resolves workspace deterministically from `X-Shopify-Shop-Domain` against `env().SHOPIFY_STORE_URL` + single-workspace check, writes resolver trace in `webhook_events.metadata`, emits explicit statuses (`workspace_resolution_failed`, `workspace_ambiguous`), and runs in observe-only mode for `inventory_levels/update`/order topics (`ignored_shipstation_authoritative`) with no order/inventory side effects. `src/trigger/tasks/process-shopify-webhook.ts` kept for controlled replay/future re-enable and now enforces topic + workspace guards plus in-workspace status taxonomy (`inventory_item_unmapped_in_workspace`, `variant_found_but_inventory_level_missing`, `sku_not_found_in_workspace`).

prior_update: 2026-04-20  # ShipStation product-import export (initial drop): scripts/export-shipstation-import.ts emits BOTH a CSV (canonical for ShipStation upload) and XLSX (human review) with the full 30-column ShipStation product-import header (SKU + Name required; remaining 28 columns best-effort populated). Mapping highlights â€” Name = "{Artist} - {Title} [- {VariantSuffix}] ({Format})" truncated to 200 chars; Weight auto-converted to oz from `weight`+`weight_unit`; Customs Description derived per-format (Vinyl LP record / Compact disc / Cassette tape / 7-inch / T-shirt apparel / Music merchandise); Tag 1=format, Tag 2=org/label, Tag 3=vendor, Tag 4=bandcamp|shopify provenance, Tag 5=preorder|draft; Thumbnail prefers warehouse_product_images.first â†’ bandcamp_art_url â†’ bandcamp_image_url; UPC accepts only 12-14 digit codes. Run output (2026-04-20T15:17): 3,048 variants loaded â†’ 3,047 rows written â†’ 100% coverage on SKU/Name/Description/Category/Tags 1-3/Customs Description+Value+Tariff, 99.7% Weight, ~50% Thumbnail, 27.0% UPC, 21.6% Fulfillment Barcode, 0% Warehouse Location + Dimensions (no warehouse_variant_locations rows yet; length_in/width_in/height_in still unpopulated â€” staff fills in pre-upload).

prior_update: 2026-04-20  # Org-id backfill (warehouse_products): scripts/backfill-product-org-id.ts resolves NULL warehouse_products.org_id (1,533 â†’ 0) using bandcamp connection > vendor exact match (organizations.shopify_vendor_name then .name) > normalized fuzzy > multi-vendor split > auto-create. Also writes organizations.shopify_vendor_name (idempotent â€” only when NULL) on 162 orgs so future shopify-sync hits the canonical key. Created Framework + Croux records (13 products). Inventory master export script (scripts/export-inventory-master.ts) produces a 4-sheet XLSX (Inventory Master, Validation Summary, Locations Reference, README) â€” uses LEFT joins to surface every variant; chunks PostgREST .in() at 200 IDs to stay under URL length limits.

prior_prior_update: 2026-04-20  # Inventory-master backfill: scripts/import-missing-skus.ts (115 sheet rows â†’ 73 warehouse_products / 100 variants / 73 Shopify drafts; auto-creates 3 orgs; tags `import:inventory-master:2026-04-20`), scripts/backfill-format-name.ts (281 â†’ 0 NULL format_name across 3,046 variants), src/trigger/lib/format-detection.ts extended SKU_PREFIX_RULES + new `bandcampTypeNameToFormat()` helper (7"/Cassette/CD checked before LP). Both scripts are dry-run by default; CSV plans land in reports/finish-line/{import-plans,format-backfill}/.

prior_update: 2026-04-18  # Saturday Workstream 1 (Phase 6 closeout): added megaplan-spot-check + deferred-followups-reminder Trigger tasks, /admin/settings/megaplan-verification page + Server Actions, docs/DEFERRED_FOLLOWUPS.md registry, MEGA_PLAN_VERIFICATION_2026-04-13.md skeleton, and a combined migration (`20260418000001_phase4b_megaplan_closeout_and_count_session.sql`) that ships the megaplan_spot_check_runs table, megaplan_sample_skus_per_client RPC, count-session columns on warehouse_inventory_levels, ShipStation v2 location mirror columns on warehouse_locations, and extends warehouse_inventory_activity_source_check to admit cycle_count + manual_inventory_count. trigger.config.ts gains the additionalFiles extension to bundle DEFERRED_FOLLOWUPS.md.

domains:
  - name: auth_and_access
    paths:
      - src/lib/server/auth-context.ts
      - src/actions/auth.ts
      - src/app/(auth)/**
      - middleware.ts
    responsibilities:
      - session resolution
      - role enforcement
      - portal/admin route protection

  - name: query_and_cache
    paths:
      - src/lib/hooks/use-app-query.ts
      - src/lib/shared/query-tiers.ts
      - src/lib/shared/query-keys.ts
      - src/lib/query-client.ts
    responsibilities:
      - canonical query wrappers
      - cache tier policy
      - invalidation contracts

  - name: staff_portal
    paths:
      - src/app/admin/**
      - src/components/admin/**
    responsibilities:
      - warehouse operations
      - client management
      - billing controls
      - integration settings
      - bundle inventory management (component tracking, availability computation)

  - name: client_portal
    paths:
      - src/app/portal/**
      - src/components/portal/**
    responsibilities:
      - inventory visibility
      - inbound submissions
      - releases
      - support and settings

  - name: server_actions
    paths:
      - src/actions/**
      - src/lib/server/bandcamp-shipping-paid.ts
      - src/lib/server/shipment-fulfillment-cost.ts
    responsibilities:
      - validated read/write boundaries
      - service role guarded mutations
      - envelope error contracts

  - name: api_routes
    paths:
      - src/app/api/**
    responsibilities:
      - webhook ingestion
      - health probes
      - provider signature validation

  - name: trigger_runtime
    paths:
      - src/trigger/tasks/**
      - trigger.config.ts
    responsibilities:
      - cron/event processing
      - asynchronous orchestration
      - resilience and retry policy

  - name: integrations
    paths:
      - src/lib/clients/**
      - src/actions/shopify.ts
      - src/actions/bandcamp.ts
      - src/actions/store-connections.ts
    responsibilities:
      - shopify/bandcamp/store sync
      - first-party Shopify webhook ingress is observe-only for inventory/orders; ShipStation is authoritative for order/inventory movement
      - shipstation/aftership/stripe/resend wiring
      - credential and connection health
      - bandcamp scraper health dashboard (getBandcampScraperHealth)
      - bandcamp Sales Report API (backfill + daily sync)
      - bandcamp sales backfill audit log (chunk-level tracking, verified completion)
      - bandcamp genre tags (HTML scraping + taxonomy matching)
      - bandcamp trending intelligence (dig_deeper API)
      - Bandcamp order sync persists shipping paid (`warehouse_orders.shipping_cost`, `line_items[].shipping`) for fulfillment margin on shipments; `bandcamp-shipping-paid` hydrates from get_orders when the DB never stored it
      - `shipment-fulfillment-cost.ts` is the single owner of fulfillment cost computation (postage + materials + pick/pack); used by `getShipments` (batch, workspace-scoped, chunked .in()) and `getShipmentDetail` (single); returns `partial`/`unknownSkus`/`missingFormatCosts`/`skuFormatMap`; all variant and format-cost queries scoped by workspace_id; integer-cents accumulation to prevent IEEE 754 drift; `batchBuildFormatCostMaps` falls back to `warehouse_products.product_type` via FK join when `format_name` is NULL, normalizing Shopify aliases via `PRODUCT_TYPE_ALIASES` (e.g. "12\" Vinyl" â†’ "LP"); null-format SKUs after fallback are added to `unknownSkus` â†’ `partial: true` â†’ amber dot (never silently skipped)
      - SKU reconciliation and auto-generation
      - workspace_catalog_stats snapshot refresh
      - Shopify product sync completeness (tracking, cost, weight, collections, publishing)
      - Distro discriminator (Phase 0.7, 2026-04-17): `warehouse_products.org_id` is nullable; `org_id IS NULL` = distro item (Clandestine-owned, no client, no Bandcamp upstream). Owner of inserts: `clandestine-shopify-sync` (daily 04:30 UTC). `bandcamp-inventory-push` defensively excludes distro variants. RLS already hides NULL-org rows from clients.
      - Client store dormancy gate (Phase 0.8, 2026-04-17): `client_store_connections.do_not_fanout = TRUE` is the default for Shopify/WooCommerce/Squarespace; ShipStation Inventory Sync is the canonical fanout path. Single chokepoint: `src/lib/server/client-store-fanout-gate.ts::shouldFanoutToConnection()`. Wired into `multi-store-inventory-push`, `client-store-order-detect`, `process-client-store-webhook`, and `createStoreSyncClient`. Reactivation Server Action: `reactivateClientStoreConnection` (staff-only). Admin UI: `/admin/settings/client-store-reconnect`. Portal store UI is hidden (sidebar nav, settings card, home cards) and `/portal/stores` redirects to `/portal`. CI guard: `scripts/check-fanout-gate.sh`.
      - ShipStation v2 inventory client (Phase 2, 2026-04-13): `src/lib/clients/shipstation-inventory-v2.ts` is the SOLE owner of `api.shipstation.com` v2 traffic. Exports `listInventory({ skus?, â€¦ })` (auto-chunked at `V2_INVENTORY_LIST_BATCH_LIMIT=50`, cursor-paged on full enumeration) and `adjustInventoryV2()` (single-SKU writes allowed; client-side validation for the Phase 0 Patch D2 boundary â€” `modify new_available:0` and `decrement quantity:0` rejected, `adjust quantity:0` allowed). Deliberately no `getInventoryBySku` helper â€” every read goes through the batch path. CI guard: `scripts/check-v2-inventory-batch.sh` (wired into `scripts/release-gate.sh`).
      - SHIP_NOTIFY ingress (Phase 2, 2026-04-13): `/api/webhooks/shipstation` (route handler â€” HMAC + dedup + enqueue, returns <500ms) plus `process-shipstation-shipment` Trigger task (Trigger.dev runtime â€” fetches v1 resource_url, resolves org and SKU via 3-tier helpers, calls `recordInventoryChange()` with `correlationId='ssv1:shipment:{id}:{sku}'` and `metadata.source_subtype='ship_notify'`; unresolvable org blocks shipment, unknown SKU isolates per-line failure into review queue). Bandcamp / client store fanout is implicit via `recordInventoryChange()` â€” no direct external API calls from the processor (Rule #48).
      - ShipStation v2 inventory seed (Phase 3, 2026-04-13): one-shot per workspace via `shipstation-seed-inventory` Trigger task. Owners â€” task: `src/trigger/tasks/shipstation-seed-inventory.ts`; helper: `src/lib/server/bandcamp-effective-available.ts` (sums `bandcamp_origin_quantities` correctly, NOT the customer-facing TOP `quantity_available` â€” Part 9 audit); Server Actions: `src/actions/shipstation-seed.ts` (`previewShipStationSeed`, `triggerShipStationSeed`, `listShipStationSeedRuns`); admin UI: `src/app/admin/settings/shipstation-seed/page.tsx`. Selection cascade per plan Â§7.1.5: `org_id IS NOT NULL` â†’ not a `bundle_components.bundle_variant_id` (Phase 2.5(a) bundle exclusion) â†’ `bandcamp_product_mappings.push_mode='normal'` â†’ `computeEffectiveBandcampAvailable > 0` â†’ `warehouse_inventory_levels.available > 0`. Push value = `warehouse_inventory_levels.available` via `adjustInventoryV2({ transaction_type:'increment' })`. Idempotent via `external_sync_events` ledger keyed by `(system='shipstation_v2', correlation_id='seed:{workspace_id}:{run_id}', sku, action='increment')`. Pinned to `shipstation` queue (concurrency 1, shared with `process-shipstation-shipment`). Dry-run mode skips the v2 call and reports gate counts. Bulk-shaped (Rule #59) â€” does NOT route through `recordInventoryChange()`; reconcile sensor (Phase 5) catches drift. Run history surfaced in `channel_sync_log` (`channel='shipstation_v2'`, `sync_type='seed_inventory'`).
      - ShipStation store refresh stub (Phase 3, 2026-04-13): `shipstation-store-refresh` task â€” currently returns `status:'deferred'` because Open Question #2 (public refresh endpoint existence) is unresolved. Records the request in `channel_sync_log` (`channel='shipstation_v1'`, `sync_type='store_refresh'`) and relies on the 24h auto-import + Phase 5 reconcile sensor as the day-one race fallback. Wiring sites can call it today; only the internal implementation flips when the endpoint is confirmed.
      - Bandcamp warehouse seed correction (Phase 1 follow-up #2, 2026-04-13): `src/lib/server/bandcamp-effective-available.ts::computeBandcampSeedQuantity({ quantity_available, origin_quantities })` is the single helper that decides what value `bandcamp-sync` writes to `warehouse_inventory_levels.available` on first ingest. Decision tree: non-empty `origin_quantities` array â†’ trust origin sum (even when 0 â€” baseline-anomaly merchants land here and Phase 1 audit flips `push_mode='blocked_baseline'`); else TOP > 0 â†’ fall back to TOP and tag `effective_source='top_fallback'` in `recordInventoryChange` metadata; else 0. Both seed sites in `src/trigger/tasks/bandcamp-sync.ts` (existing-mapping `bandcamp_initial` branch and brand-new-variant block) consume the helper; downstream auditing greps `warehouse_inventory_activity.metadata->>effective_source`. Hard prerequisite for Phase 4's bidirectional bridge.
      - Bandcamp apparel multi-variant create path (Phase A, 2026-04-20). Owners â€” helper `src/trigger/lib/bandcamp-apparel.ts` (`detectMultiVariantOptions`, `inferOptionName`, `optionDisplayValue`); extended variant builder `src/lib/clients/shopify-variant-input.ts` (`optionName` + `optionValue` parameters); new Shopify read helper `fetchProductVariantsByProductId` in `src/lib/clients/shopify-client.ts`; patched create branch in `src/trigger/tasks/bandcamp-sync.ts` immediately after `existingMappingByPackage`; migration `supabase/migrations/20260420000005_variant_bandcamp_option.sql` adds `warehouse_product_variants.bandcamp_option_id` (bigint) + `bandcamp_option_title` (text) with partial index `idx_variants_bandcamp_option`. NEW packages with â‰Ą2 distinct option SKUs materialize as N variants under one warehouse_product (option name inferred â€” `Size` / `Color` / `Variant`, NEVER `Title`); single mapping row per package keeps the `uq_bandcamp_mappings_workspace_item_id` unique index intact while per-option attribution lives on each variant row. Inventory seeded per option through `recordInventoryChange()` with stable `bandcamp-seed:{band_id}:{package_id}:opt:{option_id}` correlation IDs. SKU collisions raise `bandcamp_apparel_sku_collision` review items rather than auto-merging. Pre-existing umbrella apparel (the 616 `tracked_as_metadata` SKUs from the 2026-04-20 audit) is left in place; Path B/C structural backfill is queued. Coverage verified by `scripts/audit-bandcamp-vs-db-and-shopify.ts` (now classifies `tracked_as_metadata` and uses `normSku()` on mapping option SKUs so apparel SKUs with `&` / spaces match). Tests: `tests/unit/trigger/bandcamp-apparel.test.ts` (14 tests). Audit summary 2026-04-20: 1372 fully_aligned, 616 tracked_as_metadata, 1 in_db_missing_from_shopify, 0 missing_from_db_and_shopify (out of 1989 Bandcamp SKU rows / 1372 packages).
      - Bandcamp orphan-Shopify dupe protection (2026-04-19): unmatched `bandcamp-sync` path is DB-first to prevent external orphan explosions: insert `warehouse_products` with `shopify_product_id = NULL`, insert `warehouse_product_variants` with explicit error handling/rollback, insert `bandcamp_product_mappings`, then call Shopify `productSetCreate` and patch `warehouse_products.shopify_product_id`. Package-level dedup is keyed on `(workspace_id, bandcamp_item_id)` with unique partial index `uq_bandcamp_mappings_workspace_item_id` (migration `20260419000001_bandcamp_package_dedup_backstop.sql`). Runtime guardrails now include: early task exit when `workspaces.bandcamp_sync_paused = true`, definitive package-mapping re-check before Shopify create, and immediate `productArchive` rollback + high-severity review item when Shopify create succeeds but DB attach verification fails. Cleanup utilities: `scripts/cleanup-bandcamp-orphan-shopify.ts` (DB-linked orphans) and `scripts/cleanup-unmanaged-shopify.ts` (unmanaged Shopify drafts, archive-only, dry-run + batch + CSV artifacts).
      - Bundle availability shared helper (Phase 2.5(b), 2026-04-13): `src/lib/server/bundles.ts::computeBundleAvailability(components, componentInventory)` and `computeEffectiveBundleAvailable(bundleStockOnHand, components, componentInventory)` are the canonical bundle math. Currently consumed by `bandcamp-inventory-push.ts` (replaced inline `MIN(rawAvailable, MIN(component_available / qty))` math). Phase 4 v2 fanout will consume the same helper. Empty `components[]` returns `+Infinity` so callers can chain naturally with `Math.min(bundleStock, â€¦)`. Per-unit `quantity â‰¤ 0` is normalized to `1` (defensive â€” never propagates a divide-by-zero).
      - Bundle derived-drift sensor (Phase 2.5(c), 2026-04-13): `src/trigger/tasks/bundle-derived-drift.ts` (`bundle-derived-drift-sensor` + `bundle-derived-drift-sensor-schedule` exporting `runBundleDerivedDriftSensor` for tests). Hourly cron pinned to `shipstation` queue. Per workspace: derives bundle SKU availability via `computeEffectiveBundleAvailable`, batch-fetches v2 inventory via `listInventory({ skus })`, and opens a `warehouse_review_queue` row (`category='inventory_drift'`, `severity='medium'`, `group_key='bundle.derived_drift:{workspace_id}:{sku}'`) when `|v2.available - derived| > BUNDLE_DRIFT_TOLERANCE` (default 2 units). Re-detection bumps `occurrence_count` (Rule #55). Bundle SKUs that v2 does NOT return are skipped â€” Phase 2.5(a) excludes bundles from seed by design. Sensor never writes inventory; Rule #20 untouched.
      - Phase 5 tiered reconcile + sku_sync_status view (2026-04-13): three Trigger.dev schedule wrappers (`shipstation-bandcamp-reconcile-{hot,warm,cold}-schedule` at `*/5 * * * *` / `*/30 * * * *` / `0 */6 * * *`) plus on-demand `shipstation-bandcamp-reconcile-task` all delegate to a single `runShipstationBandcampReconcile(tier, payload, ctx, deps)` in `src/trigger/tasks/shipstation-bandcamp-reconcile.ts`. All four pinned to `shipstation` queue (concurrency 1, shared with seed/SHIP_NOTIFY/v2-decrement/bundle-drift). Per-workspace skip cascade â€” `workspaces.shipstation_v2_inventory_warehouse_id`/`_location_id` IS NOT NULL (else `skipped_no_v2_defaults`); bundle parents excluded (Phase 2.5(c) `bundle-derived-drift-sensor` owns them); tier candidate selection â€” hot = `available <= 10` UNION 24h-negative-activity SKUs, warm = 30d-negative-activity SKUs, cold = full per-workspace catalog. Reads via `listInventory({ skus, inventory_warehouse_id, inventory_location_id })` â€” Rule Â§7.1.6, NEVER `getInventoryBySku`. SKU-at-zero equality: missing v2 row treated as `available: 0` (Phase 0 Â§4.2.3). Drift thresholds (plan Â§7.1.6.1): `|drift| <= 1` silent auto-fix, `2-5` low-severity review, `> 5` high-severity review. Auto-fix ALWAYS via `recordInventoryChange({ source:'reconcile', correlationId:'reconcile:{tier}:{run_id}:{sku}' })` â€” schema migration `20260413000030_phase5_reconcile_and_sku_sync_status.sql` extends `warehouse_inventory_activity_source_check` to admit `'reconcile'`. NEVER writes to v2 (v2 is source of truth). Review queue dedup via `group_key='reconcile.qty_drift:{workspace_id}:{sku}'` (Rule #55, may escalate severity). Per-tier `channel_sync_log` rows (`channel='shipstation_v2'`, `sync_type='reconcile_{tier}'`) drive admin monitoring page `/admin/settings/shipstation-inventory` (`src/app/admin/settings/shipstation-inventory/page.tsx` + Server Actions in `src/actions/shipstation-inventory-monitor.ts` â€” `getReconcileDriftSummary`, `listReconcileRuns`, `getSkuSyncStatus`, `triggerReconcileRun`). Companion view `sku_sync_status` (in same Phase 5 migration) denormalizes per-variant: distro flag, Bandcamp mapping presence, `bandcamp_push_mode`, baseline-anomaly status, sku-conflict status, last successful v2/Bandcamp push timestamps, last external error message, available, last-internal-write timestamp. Live view today; materialization deferred until any admin surface exceeds 500ms p95 (Open Question #9).
