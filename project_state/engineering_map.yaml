updated_at: 2026-04-29  # Order Pages Transition (separate Direct + ShipStation Mirror surfaces) end-to-end implementation. Phase 0 safety rails landed (`workspaces.flags.orders_route_mode` flag, `getOrdersRouteMode`/`flipOrdersRouteMode` Server Actions, `invalidateOrderSurfaces` centralized cache helper, `orders-no-direct-revalidate.sh` CI guard, `/admin/orders/diagnostics` page, `pirate-ship-historical-link-audit` Trigger task, `normalizeStoreKey` shared util). Phase 1 identity v2 landed (migration `20260429000001_order_identity_v2.sql` adding `connection_id`/`external_order_id`/`ingestion_idempotency_key_v2`/`identity_resolution_status` + partial unique indexes + trigram indexes + `warehouse_order_identity_backfill_runs` + `warehouse_order_identity_review_queue` + `platform_order_ingest_ownership`; pure `resolveOrderIdentityV2()` + resumable `order-identity-backfill` Trigger task + `enqueueIdentityBackfill`/`resolveIdentityReview` Server Actions). Phase 2 bridge + tracking source landed (migration `20260429000002_order_mirror_links_and_tracking_source.sql` adding `order_mirror_links` + `tracking_event_source` enum on `warehouse_tracking_events`; pure `decideMirrorLink()` + `order-mirror-links-bridge` Trigger task + `enqueueMirrorLinksBridge` Server Action; EasyPost + AfterShip webhooks now stamp `tracking_source`). Phase 3 Direct Orders read model landed (`src/actions/staff-orders.ts` with explicit DTOs over `warehouse_orders`, hydrating items/shipments/tracking events/mirror links/writebacks; `DirectOrdersView` Server Component renders the table). Phase 4a preorder parity landed (migration `20260429000003_preorder_pending_view.sql` introducing `preorder_pending_orders` UNION view; `getPreorderPending()` Server Action; `preorder-predicate-drift.sh` CI guard). Phase 4b hold parity landed (Direct Orders DTO surfaces `fulfillmentHold`; `/admin/orders/holds` retains release ownership and was migrated to `invalidateOrderSurfaces`). Phase 5 platform writeback landed (migration `20260429000004_platform_fulfillment_writebacks.sql` introducing `platform_fulfillment_writebacks` + `platform_fulfillment_writeback_lines` + status enums; `openWriteback`/`recordBlockedWriteback` helper in `src/lib/server/platform-fulfillment-writeback.ts`; `mark-platform-fulfilled` opens a writeback row before the platform call, accepts `external_order_id` fallback, records `blocked_bandcamp_generic_path` and `blocked_missing_identity` explicitly; companion test `tests/unit/lib/server/platform-fulfillment-writeback.test.ts`). Phase 6 route flip landed (`/admin/orders/page.tsx` is `dynamic = "force-dynamic"` and routes by `orders_route_mode`; new dedicated `/admin/orders/shipstation/page.tsx`; new Direct Order detail page `/admin/orders/[id]/page.tsx`; sidebar exposes both Orders + ShipStation Mirror entries; `next.config.mjs` redirects `/admin/shipstation-orders` → `/admin/orders/shipstation` 301). Diagnostics surface aggregates direct/mirror/identity/holds/preorder-pending/writeback/Pirate Ship counts. Cache contract (`docs/system_map/CACHE_ARCHITECTURE.md`) expanded with the new `direct.list/detail`, `shipstationMirror.list/detail`, `mirrorLinks`, `transitionDiagnostics`, `writebackStatus` keys.   All targeted tests green (48 across `order-identity-v2`, `order-mirror-links`, `platform-fulfillment-writeback`, `invalidate-order-surfaces`, `store-key`); `pnpm check` + `pnpm typecheck` clean. Prior update preserved below.
prior_update: 2026-05-05  # SKU Matching — Shopify remote catalogs exclude digital/non-shipping variants (`iterateAllVariants` selects `requiresShipping`; `fetchShopifyCatalog` filters `shouldExcludeShopifyVariantFromSkuMatchingCatalog`). TRUTH_LAYER + API_CATALOG + `tests/unit/lib/server/sku-matching.test.ts`. Prior update preserved below.
prior_update: 2026-04-28  # Store Connections staff edit/delete: migration `20260429000005_connection_delete_null_order_refs.sql` retargets nullable Phase 1 FKs (`warehouse_orders.connection_id`, `warehouse_order_identity_backfill_runs.connection_id`, `warehouse_order_identity_review_queue.resolved_connection_id`, `platform_order_ingest_ownership.connection_id`) to `ON DELETE SET NULL` so `client_store_connections` rows can be removed. `src/actions/store-connections.ts` — `updateStoreConnection` + `disableStoreConnection` now `requireStaff` with `(id, workspace_id)`-scoped writes; `deleteStoreConnection` adds the same cutover rollback guard as disable, scoped delete, and `channel_sync_log.sync_type='connection_deleted'`. UI: `/admin/settings/store-connections` gains Edit/Delete + Sonner toasts. Prior update preserved below.
prior_update: 2026-04-28  # Operational cutover documentation: TRUTH_LAYER § Operational cutover semantics ties staff Orders (`getShipStationOrdersDb` → `shipstation_orders` when `shipstation_unified_shipping`) + SKU matching completion + manual count / sensors to measurable evidence; RELEASE_GATE adds staging smoke (ShipStation mirror + EasyPost); integration test `tests/integration/persist-sku-match-org-coverage.test.ts` proves `persist_sku_match` + coverage constraints against a linked DB when `INTEGRATION_TEST_*` env vars are set.
prior_update: 2026-04-28  # Northern Spy Label Group SKU Matching coverage. Migrations `20260428000008_client_store_connection_org_coverage.sql` and `20260428000009_seed_northern_spy_label_group_coverage.sql` add explicit multi-org connection coverage, backfill/auto-create primary rows, seed Egghunt/NNA/Across for the Northern Spy Shopify connection, and enforce coverage inside `persist_sku_match`. `src/actions/sku-matching.ts` now loads canonical variants by the covered org set and returns canonical org provenance; `/admin/settings/sku-matching` shows the label before staff accept. Prior update preserved below.
prior_update: 2026-04-28  # SKU Matching catalog narrowing: `getSkuMatchingWorkspace({ catalogOrgId? })` merges all `client_store_connection_org_coverage` orgs by default; optional `?orgId=` narrows canonical rows to one covered warehouse org. `/admin/settings/sku-matching` shows a coverage strip and a Client option "All warehouse labels — merged SKU view". Prior update preserved below as prior_update.
prior_update: 2026-04-28  # Woo SKU-matching catalog timeout hotfix. `src/lib/server/sku-matching.ts` now exports `REMOTE_CATALOG_TIMEOUTS_MS` and raises the WooCommerce review-catalog budget to 55s after live Northern Spy timing showed ~2.5s per Woo product page at safe `per_page=20`, making the prior 20s cap classify a healthy Woo API as `timeout`. Test coverage added in `tests/unit/lib/server/sku-matching.test.ts`; `TRUTH_LAYER.md` records the timeout-budget invariant. Prior update preserved below.
prior_update: 2026-04-28  # WooCommerce connection repair. Migration `20260428000007_woocommerce_connection_repair.sql` adds Woo auth preference, webhook-secret rotation, poll health fields, and order ingestion idempotency/remote-modified columns. `src/lib/server/webhook-body.ts` + `/api/webhooks/client-store` now reject unsigned/malformed/mismatched Woo webhooks before enqueue, with explicit `webhook_events` statuses. `src/lib/clients/woocommerce-client.ts` owns Basic Auth -> HTTPS query-param fallback, sticky `preferred_auth_mode`, and URL redaction; `createStoreReadClient()` lets `client-store-order-detect` poll dormant/read-only connections without enabling outbound fanout. `client-store-order-detect` now uses modified-time overlap polling and per-order watermarks; `process-client-store-webhook` handles Woo stock updates only for mapped remote SKUs and shares order idempotency/reconciliation with polling. `/admin/settings/store-connections` shows a Woo webhook checklist and poll/webhook health. Prior update preserved below.
prior_update: 2026-04-28  # Support launcher default-minimized patch. `src/components/support/support-launcher.tsx` no longer reads/writes browser storage for open state, so every refresh starts minimized by default. New unread support activity still sets the badge/pulse alert but no longer calls `setOpen(true)`, preventing the chat panel from opening unless the user explicitly clicks the launcher. Prior update preserved below.
prior_update: 2026-04-28  # SKU matching Accept-best-match latency and feedback patch. `src/actions/sku-matching.ts::createOrUpdateSkuMatch()` still validates stale fingerprints but skips Shopify readiness and preview telemetry during accept persistence, avoiding the expensive stocked-at-location check that belongs only in the Review drawer. `src/app/admin/settings/sku-matching/sku-matching-client.tsx` now optimistically removes accepted rows, refreshes the server bootstrap in the background, and uses Sonner to toast saved/rejected candidate outcomes. Prior update preserved below.
prior_update: 2026-04-28  # SKU matching manual remote-search drawer viewport hardening. `src/app/admin/settings/sku-matching/sku-matching-client.tsx` now constrains the Review dialog to the visual viewport width/height, hides horizontal overflow, force-wraps long Shopify GIDs in search/preview cards, keeps remote search results internally scrollable, and uses a non-negative-margin sticky action rail so long result lists cannot trap or horizontally clip the selected preview/confirm controls. Prior update preserved below.
prior_update: 2026-04-28  # SKU matching manual remote-search workflow. `supabase/migrations/20260428000006_sku_match_candidate_rejections.sql` adds staff-only `sku_match_candidate_rejections` so operators can mark a repeated bad remote candidate as not-a-match without mutating `client_store_sku_mappings`. `src/actions/sku-matching.ts` adds `searchSkuRemoteCatalog()` (title/SKU/artist/barcode/product/variant/inventory-id search over the fetched remote catalog) and `rejectSkuMatchCandidate()` (connection-scoped suppression with audit telemetry); workspace ranking and candidate search ignore rejected remotes while manual preview/confirm can still target a selected search result. The review drawer in `src/app/admin/settings/sku-matching/sku-matching-client.tsx` now lets staff search, preview a selected remote product/variant, confirm it as a manual strong match, or suppress the current bad candidate connection-wide. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching Accept/Confirm production fix. `supabase/migrations/20260428000005_fix_alias_scope_trigger_org_guard.sql` replaces `enforce_identity_match_scope()` so the shared identity/alias scope trigger reads optional `org_id` through `to_jsonb(NEW)->>'org_id'`; live `client_store_sku_mappings` rows do not have an org_id column, so the prior trigger aborted `persist_sku_match` with `record "new" has no field "org_id"`. `src/app/admin/settings/sku-matching/sku-matching-client.tsx::acceptBestMatch()` now surfaces failures once via the page-level SKU match action alert instead of rethrowing into the row action wrapper. Playwright smoke reproduced the 500, verified the real DB error, pushed the migration, and then verified Accept best match completed with no visible action errors, no console errors, and no non-aborted network failures. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching workspace load performance fix. `src/actions/sku-matching.ts::getSkuMatchingWorkspace()` no longer calls Shopify stocked-at-location readiness GraphQL once per canonical row. Initial load now does only cheap readiness classification (default location present + remote inventory item id present) and leaves the expensive per-item location check to the preview drawer. Independent workspace reads (flags, remote catalog, canonical rows, existing mappings, conflicts) now run in parallel before row shaping. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching Server Action boundary hardening. `previewSkuMatch()` now returns a JSON-plain payload, accept paths call an internal preview helper instead of reusing the exported Server Action, and every SKU matching client mutation sanitizes variables before invoking a Server Action. This closes the remaining "Only plain objects..." failure path for Accept/Confirm when prior preview/workspace payloads include null-prototype objects. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching page repair. `src/lib/server/sku-matching.ts` now owns deterministic Bandcamp mapping selection (`pickPrimaryBandcampMapping`), ordered connection-scoped remote target lookup (`selectConnectionScopedRemoteTarget`), and the candidate fingerprint contract. `src/actions/sku-matching.ts` uses those helpers for workspace load, preview, accept, bulk accept, and passes remoteSku through preview so product-id fallback can reject ambiguous SKU-less multi-variant products instead of choosing row order. `src/lib/server/sku-autonomous-dry-run.ts` shares the Bandcamp selector. `src/app/admin/settings/sku-matching/sku-matching-client.tsx` clears stale URL/dialog/error state when switching client/connection, disables dense-card virtualization below 2000 rows, emits a passive large-catalog breadcrumb, and surfaces Accept/Confirm failures visibly. Tests added in `tests/unit/actions/sku-matching.test.ts` and `tests/unit/app/admin/settings/sku-matching-client.test.tsx`; helper coverage expanded in `tests/unit/lib/server/sku-matching.test.ts`. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching confirm serialization closure. `src/actions/sku-matching.ts::createOrUpdateSkuMatch()` now JSON-sanitizes the `persist_sku_match` RPC response before returning to React, closing the remaining "Only plain objects..." failure path after the client-side payload sanitizer. Both "Accept best match" and preview-drawer "Confirm match" share this Server Action. Prior update preserved below.
prior_update: 2026-04-27  # SKU matching visual comparison links. `src/lib/server/shopify-connection-graphql.ts::iterateAllVariants()` now selects Shopify product `handle`; `src/lib/server/sku-matching.ts::fetchShopifyCatalog()` builds `RemoteCatalogItem.productUrl` for Shopify storefront product pages; `src/actions/sku-matching.ts` selects `bandcamp_product_mappings.bandcamp_url` into `SkuMatchingRow.bandcampUrl` and the preview canonical payload; `src/app/admin/settings/sku-matching/sku-matching-client.tsx` renders "Open Shopify product" / "Open Bandcamp product" links in both the row linked-ID section and preview drawer. Prior update preserved below.
prior_update: 2026-04-27  # Autonomous SKU matching — Phase 8 hold ingress (SKU-AUTO-3 + SKU-AUTO-21). NEW shared module `src/lib/server/order-hold-ingress.ts`: `runHoldIngressSafely` (workspace guard read + fail-open legacy verdict + sensor warnings), `evaluateAndApplyOrderHold` (chains `loadNormalizedOrder` with `source: webhook|poll|recovery` → `evaluateOrderForHold` → `applyOrderFulfillmentHold` with deterministic `buildIngressCycleId` + commit/held line builders). WIRED: `src/trigger/tasks/process-client-store-webhook.ts::handleOrderCreated` after `warehouse_order_items` insert — persists warnings, skips `commitOrderItems` when `hold_applied`, filters inventory decrement to `committableRemoteSkus`, enqueues `send-non-warehouse-order-hold-alert` when `clientAlertRequired`. WIRED: `src/trigger/tasks/client-store-order-detect.ts` after poll order+items insert — same hold path + alert enqueue; poll does not decrement inventory (webhook canonical for stock). EXTENDED: `src/lib/server/normalized-order-loader.ts` accepts `source: "webhook"`. Tests: `tests/unit/lib/server/order-hold-ingress.test.ts` (46 cases), `tests/unit/trigger/process-client-store-webhook.test.ts` Phase 8 describe block (7 cases). Release gates SKU-AUTO-3 + SKU-AUTO-21 flipped Active in `docs/RELEASE_GATE_CRITERIA.md` §C.5. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 7 rollout telemetry + sign-off surface landed. Five NEW artifacts plus sidebar wiring: (7.A) `src/lib/server/sku-autonomous-telemetry.ts` — pure summarizer `summarizeAutonomousTelemetry(input)` that takes pre-fetched runs + decisions + `sku_outcome_transitions` + `order_fulfillment_hold_events` + identity outcome counts over a trailing window and computes Phase 7 "Critical success criteria" against hard thresholds (exported as `TELEMETRY_THRESHOLDS`: `max_demotion_rate=2%`, hold_released_rate band `60-80%`, `max_client_alerts_per_week=20`, promotion_rate_monthly band `10-30%`, `min_decision_audit_completeness=100%`, `max_run_failure_rate=10%`). Each trip produces a typed `TelemetryReasonCode` (exported as `TELEMETRY_REASON_CODES`). Divide-by-zero yields `null` rates (explicit: absence of evidence is NOT an implicit green); empty windows yield `status='healthy'` with `reasons=[]`. Returns `{ status:'healthy'|'warning', reasons:[], summary:{…} }`. Companion test `tests/unit/lib/server/sku-autonomous-telemetry.test.ts` (33 cases — every threshold branch + divide-by-zero + empty window + boundary conditions + semantic invariants). (7.B) `src/trigger/tasks/sku-autonomous-telemetry.ts` exports `skuAutonomousTelemetryScheduledTask` (cron `0 8 * * 1` — weekly, Mon 08:00 UTC) + `skuAutonomousTelemetryManualTask` — per workspace fetches the 30-day window via paginated decision reads, routes through `summarizeAutonomousTelemetry`, and emits ONE `sensor_readings` row (`sensor_name='sku_autonomous.telemetry'`, status mapped to `healthy`/`warning`/`paused`) carrying `{ summary, identity_counts, truncated:{runs,decisions,transitions,hold_events}, emergency_paused }`. For every threshold trip UPSERTS a `warehouse_review_queue` row keyed by ISO-week bucket (`group_key='sku-autonomous-telemetry:{workspace_id}:{isoWeekKey(now)}:{reason_code}'`) so a reason tripping multiple weeks is one row per week, not an ever-growing pile. **Emergency-pause contract:** the sensor ALWAYS writes (observability must not drop during an incident — SKU-AUTO-28 applies to mutations, not read surfaces) but review queue upserts are suppressed while `workspaces.sku_autonomous_emergency_paused=true` — the `emergency_paused:true` flag on the sensor row is the operator signal, not queue spam. Helper `isoWeekKey(date)` exported for test seams. Registered in `src/trigger/tasks/index.ts`. Companion test `tests/unit/trigger/sku-autonomous-telemetry.test.ts` (21 cases — structural fake Supabase covers always-sensor-writes, pause suppression, per-table fetch errors, pagination, multi-workspace iteration, workspace-ID filter, ISO-week edge cases including year boundaries, end-to-end with all tables populated). (7.C) `src/actions/sku-autonomous-rollout.ts` — three Server Actions, ALL staff-only + workspace-scoped: `getAutonomousRolloutHealth()` is a single-read aggregator returning `{ workspaceId, flags, emergencyPause, telemetry, canaryReview, linkage }` — partial failure produces typed error markers per panel instead of throwing (panel-level degradation), so the rollout page always renders something actionable; reads the latest `sensor_readings` row for `sku_autonomous.telemetry`, the latest `warehouse_review_queue` row in category `sku_autonomous_canary_review`, and the `compute_bandcamp_linkage_metrics` RPC. `createAutonomousCanaryReview({intendedFlag?, title?, note?})` opens a `warehouse_review_queue` row with `category='sku_autonomous_canary_review'`, `severity='high'`, `status='open'`; defaults `intendedFlag='sku_live_alias_autonomy_enabled'` with a phase-specific auto-title; operator-supplied `title`/`note` override defaults (Zod-validated bounds). `resolveAutonomousCanaryReview({reviewId, resolutionNote?})` enforces workspace ownership, returns `{alreadyResolved:true}` on idempotent re-call, merges prior metadata with `resolution_note`+`resolved_by_user`, revalidates `/admin/settings/sku-matching/rollout` + `/admin/settings/feature-flags`, and calls `invalidateWorkspaceFlags(workspaceId)` so the next `flipAutonomousMatchingFlag` preflight (SKU-AUTO-19) sees the resolved row immediately. Companion test `tests/unit/actions/sku-autonomous-rollout.test.ts` (28 cases — auth guard, flag projection defaults, emergency-pause surfacing, telemetry missing/error/ok, canary kind projections, linkage `unavailable` vs `allClear` variants, Zod bounds, insert failure paths, idempotent resolve, error fallthroughs). (7.D) `src/app/admin/settings/sku-matching/rollout/page.tsx` + `rollout-client.tsx` — the authoritative sign-off surface for deciding when `flipAutonomousMatchingFlag` is safe. Server page gated by `workspaces.flags.sku_autonomous_ui_enabled` (renders stub otherwise), bootstraps `getAutonomousRolloutHealth()` into the client component; client renders five panels (emergency pause / flags / telemetry / linkage / canary review) and wires `createAutonomousCanaryReview` + `resolveAutonomousCanaryReview` via `useTransition` + `router.refresh()` so the server render stays the source of truth after each write. Flag flips themselves still happen on `/admin/settings/feature-flags` — this page is the evidence-gathering + sign-off stage. (7.E) `src/components/admin/admin-sidebar.tsx` — SETTINGS_ITEMS gains "Autonomous Rollout" between "Identity Matches" and "Reconnect Client Stores" (also gated by `sku_autonomous_ui_enabled`). Pre-push guard: NEW `scripts/check-use-server-exports.ts` + `scripts/ci-use-server-exports-guard.sh` + unit test `tests/unit/scripts/check-use-server-exports.test.ts` (14 cases) — fast (~200ms) TypeScript-AST guard that catches non-async-function exports from `"use server"` modules BEFORE they reach the cryptic `.next/server/*`-chunk-level `invalid-use-server-value` failure at `pnpm build`. Wired into `.github/workflows/ci.yml` ahead of the Next.js build step, `docs/RELEASE_GATE_CRITERIA.md`, and `scripts/cloud-agent-verify.sh`. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 6 staff + portal audit surfaces landed (6.A/6.B autonomous-runs read surface, 6.C/6.D order-holds resolution surface, 6.E identity-matches read surface, 6.F portal stock-exceptions feed, 6.G canary sign-off + flag-flip Server Action). NEW Server Actions all workspace-scoped defense-in-depth on top of RLS, all gated behind `workspaces.flags.sku_autonomous_ui_enabled` (admin) or `client_stock_exception_reports_enabled` (portal) except `/admin/orders/holds` which stays ungated so staff can always resolve existing holds. (6.A/6.B) `src/actions/sku-autonomous-runs.ts` — `listAutonomousRuns`, `getAutonomousRunDetail`, `getVariantDecisionHistory` — read-only paginated view over `sku_autonomous_runs` + `sku_autonomous_decisions`; `limit ≤ 200`. UI at `src/app/admin/settings/sku-matching/autonomous-runs/` (server page + `autonomous-runs-client.tsx`). (6.C/6.D) `src/actions/order-holds.ts` — `listOrderHolds` paginates `warehouse_orders.fulfillment_hold='on_hold'`, `releaseOrderHold`/`releaseOrderHoldsBulk` wrap the `release_order_fulfillment_hold` RPC. `staff_override` resolution requires a non-empty note (SKU-AUTO-17/32 — enforced at both Zod and RPC). UI at `src/app/admin/orders/holds/` (server page + `holds-client.tsx`). (6.E) `src/actions/sku-identity-matches.ts` — `listIdentityMatches`, `getIdentityMatchDetail` — paginated view over `client_store_product_identity_matches` + `sku_outcome_transitions`; this file is WHITELISTED in `scripts/ci-checks/sku-identity-no-fanout.sh` (reads identity table but never feeds fanout — SKU-AUTO-1 preserved). UI at `src/app/admin/settings/sku-matching/identity-matches/` (server page + `identity-matches-client.tsx` with evidence-snapshot drawer + transition timeline). (6.F) `src/actions/portal-stock-exceptions.ts` — `listClientStockExceptions({connectionId?, platform?, limit, offset})` — client-only (`requireClient()`), explicit `org_id=:caller.orgId` on top of `client_select_identity_matches` RLS; returns ONLY `outcome_state='client_stock_exception' AND is_active=true`; intentionally omits `evidence_snapshot` / `remote_fingerprint` / `remote_inventory_item_id` from the payload. UI at `src/app/portal/stock-exceptions/` (server page + `stock-exceptions-client.tsx`). NEW TOGGLEABLE_PAGES entry `stock-exceptions` added to `src/lib/shared/portal-pages.ts` so the existing per-org visibility toggle applies; portal sidebar gains the entry. NEW workspace flag `client_stock_exception_reports_enabled` added to `src/lib/server/workspace-flags.ts` (strict schema + `WorkspaceFlags` type). (6.G) `src/actions/sku-autonomous-canary.ts::flipAutonomousMatchingFlag({flag, enabled, note?})` — SKU-AUTO-19 enforcement for turning autonomous flags ON. Canary-gated flags (`sku_identity_autonomy_enabled`, `sku_live_alias_autonomy_enabled`) require a RESOLVED `warehouse_review_queue` row with category `sku_autonomous_canary_review` (missing row → `canary_review_missing`, open row → `canary_review_unresolved` with row id). `sku_live_alias_autonomy_enabled` ADDITIONALLY requires: (a) workspace NOT in `sku_autonomous_emergency_paused`, (b) `compute_bandcamp_linkage_metrics` clears Phase 7 thresholds (`linkage_rate ≥ 0.7`, `verified_rate ≥ 0.6`, `option_rate ≥ 0.4`). Turning any flag OFF bypasses every preflight (fast-rollback path — the point of the off-flip is speed). Every successful flip writes an audit row to `warehouse_review_queue` (category `sku_autonomous_flag_flip_audit`, status `resolved`, metadata `{flag, previous_value, new_value, note}`) and calls `invalidateWorkspaceFlags()` so downstream tasks pick up the change on next tick. Admin surfaces wired into sidebar (`src/components/admin/admin-sidebar.tsx` — "Order Holds" under top-level NAV_ITEMS alongside Orders; "Autonomous Runs" + "Identity Matches" under SETTINGS_ITEMS between SKU Matching and Reconnect Client Stores). Portal sidebar (`src/components/portal/portal-sidebar.tsx`) gains "Stock Exceptions" between Support and Settings. Companion tests (all green at landing): `tests/unit/actions/sku-autonomous-runs.test.ts`, `tests/unit/actions/sku-identity-matches.test.ts`, `tests/unit/actions/order-holds.test.ts`, `tests/unit/actions/portal-stock-exceptions.test.ts` (5), `tests/unit/actions/sku-autonomous-canary.test.ts` (10 — covers canary gate missing/open/resolved, Phase 7 linkage threshold trip, emergency-pause block, rollback fast-path, UI-only flag bypass, `requireStaff` rejection). Remaining autonomous work (Phase 7 live-alias flag flip via this action against a real canary review row, Phase 8 GA with flag-removal migration) stays tracked in `docs/DEFERRED_FOLLOWUPS.md`. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 5 Trigger tasks landed (5.A stock-stability-sampler + purge, 5.B sku-shadow-promotion, 5.C sku-hold-recovery-recheck, 5.D sku-holdout-stop-condition-sweep). NEW Trigger tasks (all registered in `src/trigger/tasks/index.ts`, NONE pinned to `bandcamp-api`, ALL respect `workspaces.sku_autonomous_emergency_paused` with fail-closed pause reads per Rule SKU-AUTO-20): (5.A) `src/trigger/tasks/stock-stability-sampler.ts` exports `stockStabilitySamplerScheduledTask` (`*/15 * * * *`) + `stockStabilitySamplerManualTask` + `stockStabilityReadingsPurgeScheduledTask` (`0 4 * * *`) — per workspace unions variant IDs from `client_store_product_identity_matches` (non-terminal outcomes) + `client_store_sku_mappings` (all pushed variants), batch-reads `warehouse_inventory_levels.(available, committed_quantity)`, and upserts `stock_stability_readings` rows bucketed to the 15-minute mark via `INSERT … ON CONFLICT DO NOTHING` so overlapping runs are idempotent; pure shaping helpers extracted to `src/lib/server/stock-stability-sampler.ts` (exports `SAMPLER_WAREHOUSE_SOURCE` constant used by 5.B to filter history); nightly purge drops rows older than `STABILITY_WINDOWS_MS.boost × safety`. (5.B) `src/trigger/tasks/sku-shadow-promotion.ts` exports `skuShadowPromotionScheduledTask` + `…ManualTask` — daily sweeper that reads promotion candidates via the partial index `idx_identity_matches_promotion_candidates` (outcome_state `auto_database_identity_match`, `is_active=true`, `warehouse_stock_at_match > 0`), derives `PathAEvidenceFlags` from `evidence_snapshot`, counts prior `sku_autonomous_decisions` for Path B decision-count gate, reads current ATP from `warehouse_inventory_levels`, reads 24h `stock_stability_readings` filtered by `SAMPLER_WAREHOUSE_SOURCE`, and runs the pure `shouldPromoteShadow()` policy (`src/lib/server/sku-shadow-promotion-policy.ts` — exports `SHADOW_STABILITY_DAYS_MIN=7`, `SHADOW_DECISION_COUNT_MIN=3`, `ShadowPromotionDecision` discriminated union). `action:'promote'` delegates to `promoteIdentityMatchToAlias()` (SKU-AUTO-8 — the single legal TS entry point; wrapper writes its own decision + transition rows and self-gates on emergency pause / autonomy flag / stability); `action:'bump'` increments `evaluation_count`/`state_version`/`last_evaluated_at` under OCC and writes a single `sku_autonomous_decisions` row with `outcome_changed=false` + `disqualifiers` array. One `sku_autonomous_runs` row per workspace per pass (`trigger_source='scheduled_periodic'`). (5.C) `src/trigger/tasks/sku-hold-recovery-recheck.ts` exports `skuHoldRecoveryRecheckScheduledTask` (`*/30 * * * *`) + `…ManualTask` — 30-minute sweeper over `warehouse_orders` held with `fulfillment_hold='on_hold'` AND `fulfillment_hold_reason='fetch_incomplete_at_match'` AND `fulfillment_hold_at >= now() - 24h`, ordered by `fulfillment_hold_at` ascending, capped at 200 rows per workspace per pass. Per order: resolves the connection row → calls `fetchRemoteCatalogWithTimeout()` from `src/lib/server/sku-matching.ts` as a platform-health probe → `loadNormalizedOrder({ source:'recovery' })` from `src/lib/server/normalized-order-loader.ts` → `evaluateOrderForHold()` from `src/lib/server/order-hold-evaluator.ts`. When BOTH the fetch succeeds AND `evaluation.decision.shouldHold === false`, releases via `releaseOrderFulfillmentHold({ resolutionCode:'fetch_recovered_evaluator_passed', actorKind:'recovery_task' })` — the resolution code is one of the five values in SKU-AUTO-17's whitelist and is enforced by the RPC's CHECK on `p_resolution_code` (defense in depth). Fetch failure → counted as `still_held` (expected when a platform is still unhealthy, not an error from our perspective). (5.D) `src/trigger/tasks/sku-holdout-stop-condition-sweep.ts` exports `skuHoldoutStopConditionSweepScheduledTask` (`30 4 * * *` daily) + `…ManualTask` — sweeps `client_store_product_identity_matches` rows stuck in `auto_holdout_for_evidence` meeting EITHER stop condition (`evaluation_count >= 10` → `holdout_expired_10_evaluations`; OR `age_days >= 90` → `holdout_expired_90_days`; when BOTH are true age wins because age is the harder rotation guarantee). One DB round-trip via `.or()` with a defensive per-row `pickReason()` check — rows the `.or()` selected but whose client-side check no longer passes are counted as `skipped_not_stuck` without a transition call. Transition via `applyOutcomeTransition({ from:'auto_holdout_for_evidence', to:'auto_reject_non_match', trigger:'periodic_revaluation', reasonCode })` — the RPC applies `pg_advisory_xact_lock` + `state_version` OCC (SKU-AUTO-14/22). Every candidate (success or failure) writes a `sku_autonomous_decisions` row (`previous_outcome_state='auto_holdout_for_evidence'`, `reason_code`, success sets `outcome_state='auto_reject_non_match'`, failure sets `outcome_changed=false` and puts the RPC error reason in `disqualifiers`). Companion tests (all green at landing — 91 new cases total): `tests/unit/lib/server/stock-stability-sampler.test.ts`, `tests/unit/lib/server/sku-shadow-promotion-policy.test.ts` (24 cases — Path A × Path B × gate matrix), `tests/unit/trigger/stock-stability-sampler.test.ts` (iteration safety + pause skip + dedup + purge), `tests/unit/trigger/sku-shadow-promotion.test.ts` (Path A/B promotions + bump paths + promotion_blocked + emergency pause + error handling), `tests/unit/trigger/sku-hold-recovery-recheck.test.ts` (10 cases — happy path + fetch failure + evaluator-still-holds + loader failure + connection missing + release RPC failure + per-workspace pause + pause read failure + orders read failure + workspaces read failure), `tests/unit/trigger/sku-holdout-stop-condition-sweep.test.ts` (10 cases — age / evaluation / BOTH age-wins / skipped_not_stuck defensive path / transition failure / pause short-circuit / pause read failure / candidates read failure / workspaces read failure / run open failure). Remaining autonomous work (Phase 6 admin views, Phase 7 live-alias autonomy flag flip, Phase 8 GA) stays tracked under the existing deferred entries. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 4 webhook-ingress demotion-rehydrate path landed (SKU-AUTO-24). NEW pure module `src/lib/server/webhook-rehydrate-policy.ts::decideRehydrateAction()` — zero-I/O policy that takes `{identityRow, inboundStockSignal, warehouseLevel, stabilityHistory, now}` and returns a discriminated `RehydrateAction` union (`no_identity_row | promote | bump_evidence | refresh_evidence`) enforcing gate order per plan §"Post-demotion webhook ingress": (1) exit on no identity row, (2) non-exception rows always refresh evidence (never promote — rehydrate is exclusive to `client_stock_exception`), (3) exception rows require `classifyStockTier(inboundStockSignal) ∈ {authoritative, fresh_remote}` else bump, (4) exception rows require `atpOf(warehouseLevel) > 0` else bump, (5) exception rows require `isStockStableFor('boost', stabilityHistory, now)` else bump, (6) only on all four passes does the policy return `promote` with `reason='stock_positive_promotion'`. NEW async orchestrator `src/lib/server/webhook-rehydrate.ts::rehydrateWebhookInventoryUpdate(supabase, input)` — owns ALL I/O for the flow: (a) reads `workspaces.sku_autonomous_emergency_paused` (short-circuits `emergency_paused` without touching identity rows — SKU-AUTO-28 belt-and-braces even though `promoteIdentityMatchToAlias` self-gates), (b) walks the identity-lookup cascade `(connection_id, remote_inventory_item_id) → (connection_id, remote_product_id, remote_variant_id) → (connection_id, remote_fingerprint)` to find ONE active identity row, (c) reads `warehouse_inventory_levels` by `variant_id` for ATP, (d) reads the last N `stock_stability_readings` for the alias's `(workspace_id, sku)` (N=40), (e) opens a `sku_autonomous_runs` row (`trigger_source='stock_change_trigger'`, `dry_run=false`, `status='running'`), (f) dispatches to the pure policy, (g) on `promote` delegates to `promoteIdentityMatchToAlias()` with `reason='stock_positive_promotion'` and returns `{kind:'promoted', aliasId, identityMatchId, decisionId, runId}` or `{kind:'promotion_blocked', identityMatchId, reason, detail, runId}` (wrapper's typed reason is NOT re-wrapped), (h) on `bump_evidence` / `refresh_evidence` updates `client_store_product_identity_matches.evidence_snapshot` + `evaluation_count += 1` + `last_evaluated_at` and closes the run with `status='completed'`, (i) emits a defensive `emergency_paused` short-circuit if the workspace is paused before step (b). Fail-open on `identity_lookup_failed` (transient DB read errors on the identity cascade must NOT block downstream discovery). Custom structural `RehydrateSupabaseClient` interface (narrower than `SupabaseClient` for test mockability — covers only `.from(table).select(…).eq(…)…maybeSingle()` / `.single()`, `.from(table).insert(…).select().single()`, `.from(table).update(…).eq(…)`). WIRED into `src/trigger/tasks/process-client-store-webhook.ts::handleInventoryUpdate()` — the Shopify branch, when `mappingRow?.remote_sku` is missing (no live alias), now calls `rehydrateWebhookInventoryUpdate()` BEFORE the historical `sku_mapping_missing` return. Outcome → `webhook_events.status` mapping: `promoted → rehydrate_promoted_alias` (processed=true, returns alias/decision/run IDs), `updated_evidence_only → rehydrate_evidence_only` (processed=true), `bumped_reobserved → rehydrate_bumped_evidence` (processed=true), `promotion_blocked → rehydrate_promotion_blocked` (processed=false, returns promotion reason/detail), `run_open_failed → rehydrate_run_open_failed` (processed=false), `emergency_paused → sku_autonomy_emergency_paused` (processed=false). `no_identity_row` and `identity_lookup_failed` fail-open to the historical `sku_mapping_missing` path so discovery still runs on genuinely-unknown listings. The `StockSignal` constructed from the inbound webhook uses `source='shopify_graphql'`, `tier='fresh_remote'`, `observedAt=now`. Companion tests: `tests/unit/lib/server/webhook-rehydrate-policy.test.ts` (13 cases — every gate branch + classifier tie-ins + `no_identity_row` fast path + `client_stock_exception` × `authoritative|fresh_remote|cached_only|stale|unavailable` × `ATP>0|ATP=0` × `stability pass|fail` matrix), `tests/unit/lib/server/webhook-rehydrate.test.ts` (36 cases — emergency pause, workspace read failure, identity cascade all three keys, warehouse row missing, run open failure, promotion happy path, promotion_blocked mapping, evidence-update side effects, `no_identity_row` never returns when a row exists), and NINE new rehydrate-branch cases in `tests/unit/trigger/process-client-store-webhook.test.ts` (every outcome branch + "live alias exists → orchestrator NOT called" + identity_lookup_failed/no_identity_row fall-through to `sku_mapping_missing`). Full adjacent SKU-autonomous suite green: 313 tests across `webhook-rehydrate-policy` / `webhook-rehydrate` / `process-client-store-webhook` / `sku-alias-promotion` / `stock-reliability` / `sku-outcome-transitions` / `sku-matching` / `sku-candidate-evidence` / `evaluate-order-for-hold` / `order-hold-rpcs`. Migration discrepancy noted (plan references `last_reobserved_at` but schema has `last_evaluated_at` + `evaluation_count`): sticking with existing schema, deferred as a follow-up if plan-text consolidation is requested. Remaining autonomous work (Phase 5+ Trigger tasks `sku-shadow-promotion` / `stock-stability-sampler` / `sku-hold-recovery-recheck` / `sku-holdout-stop-condition-sweep`, Phase 6 admin views, Phase 7 live-alias autonomy flag flip, Phase 8 GA) stays tracked under the existing deferred entries. Prior update preserved below.
prior_update: 2026-04-27  # Autonomous SKU matching — Phase 3 substrate landed (3.A alias promotion wrapper + 3.B order-hold RPCs + 3.C hold-alert task + bulk suppression). NEW migrations applied to remote: `supabase/migrations/20260428000003_order_fulfillment_hold_rpcs.sql` (RPC `apply_order_fulfillment_hold(p_order_id, p_connection_id, p_reason, p_cycle_id, p_held_lines, p_commit_lines, p_actor_kind, p_actor_id, p_metadata)` + RPC `release_order_fulfillment_hold(p_order_id, p_resolution_code, p_note, p_actor_kind, p_actor_id, p_metadata)` — both take `pg_advisory_xact_lock(hashtext('order_hold:' || order_id))` as first effectful statement (SKU-AUTO-22), `apply` commits `inventory_commitments` rows for `p_commit_lines` in the SAME transaction as the `hold_applied` event insert (SKU-AUTO-15 + SKU-AUTO-21), `release` requires a non-empty `p_note` when `p_resolution_code='staff_override'` (SKU-AUTO-32), system-set `metadata` keys cannot be spoofed via `p_metadata`, both RPCs are idempotent on retry with the same cycle_id / released state and reject conflicting cycle_ids); `supabase/migrations/20260428000004_hold_alert_idempotency_index.sql` (partial unique index `uq_hold_alert_sent_per_cycle ON order_fulfillment_hold_events (workspace_id, order_id, hold_cycle_id) WHERE event_type = 'hold_alert_sent'` — DB-level belt for SKU-AUTO-16 alert idempotency). NEW TypeScript modules: `src/lib/server/sku-alias-promotion.ts::promoteIdentityMatchToAlias()` wraps `promote_identity_match_to_alias` RPC with path A/B/C policy (strong_evidence / stability / human_approval — SKU-AUTO-8), enforces client-side gates before RPC (emergency pause → `emergency_paused`, `sku_live_alias_autonomy_enabled!==true` → `autonomy_flag_disabled`, Path B without `isStockStableFor('promotion')` → `stock_not_stable_for_promotion`), maps every RPC exception to typed reason (`identity_not_found`, `state_version_mismatch`, `from_state_drift`, `atp_insufficient`, `cutover_blocked`, `rpc_error`), writes exact