old | skipped_already_sent | skipped_bulk_suppressed | skipped_no_recipient | failed_provider_error`), three-layer idempotency (application SELECT pre-check, DB partial unique index, Resend `Idempotency-Key`), recipient resolution prefers `users WHERE role IN ('client','client_admin') AND org_id = order.org_id` with fallback to `organizations.support_email`, integrates `shouldSuppressBulkHold` and emits `bulk_hold_suppression_active` ops alert once per window, handles `23505` on audit insert as `skipped_already_sent` (race), emits `hold_alert_dispatch_failed` ops alert for non-23505 audit failures so operators can backfill, registered in `src/trigger/tasks/index.ts`). Extended `src/lib/server/workspace-flags.ts` with five new flags (`sku_identity_autonomy_enabled`, `sku_live_alias_autonomy_enabled`, `non_warehouse_order_hold_enabled`, `non_warehouse_order_client_alerts_enabled`, `sku_autonomous_ui_enabled`) — the emergency pause stays as a top-level `workspaces` column, NOT a JSONB flag. Extended `src/lib/server/stock-reliability.ts::STABILITY_WINDOWS_MS` with `promotion: 6 * 60 * 60 * 1000` so `isStockStableFor('promotion')` matches plan §stability windows. Companion tests (all green at landing): `tests/unit/lib/server/sku-alias-promotion.test.ts` (path × reason matrix + emergency pause + autonomy flag + stability gate + RPC error mapping + decision-row insert success/failure), `tests/unit/lib/server/order-hold-rpcs.test.ts` (pure predicate + pre-RPC validation + happy paths + commit-line sanitization + RPC error mapping + response-shape tolerance), `tests/integration/order-hold-rpcs.test.ts` (live-DB gated on `INTEGRATION_TEST_SUPABASE_URL` + `INTEGRATION_TEST_SERVICE_ROLE_KEY` — apply→release timeline, same-tx commit visibility (SKU-AUTO-21), idempotent retries, cycle_id conflict, staff_override note enforcement (SKU-AUTO-32), invalid resolution_code rejection (SKU-AUTO-17)), `tests/unit/lib/server/order-hold-bulk-suppression.test.ts` (contract constants + non-suppressible reason short-circuit + window math + fail-open on DB error + column-selection assertion), `tests/unit/lib/server/ops-alert.test.ts` (Sentry path tag/level mapping + Slack path payload shape + failure modes + composite result), `tests/unit/trigger/send-non-warehouse-order-hold-alert.test.ts` (22 cases — every decision-tree branch + pure helpers `extractNonWarehouseLines` + `buildHoldAlertBody`). Broader sanity check: 1205 tests across 89 files green. `TRUTH_LAYER.md` autonomous-matching section gains three new invariants: "Alias promotion wrapper + path A/B/C policy (Phase 3.A)", "Order hold RPCs (Phase 3.B)", and "Non-warehouse order hold alert + bulk suppression (Phase 3.C)". Remaining autonomous work (Phase 4 webhook-ingress rehydrate + order-hold trigger wiring, Phase 5+ Trigger tasks `sku-shadow-promotion` / `stock-stability-sampler` / `sku-hold-recovery-recheck` / `sku-holdout-stop-condition-sweep`, Phase 6 admin views, Phase 7 live-alias autonomy flag flip, Phase 8 GA) stays tracked under the existing deferred entries. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 2 substrate landed (2.A normalized-order adapter + 2.B order-hold policy + 2.C CandidateEvidence/gate classifier). NEW pure modules (no I/O, no Date.now, no random — all exhaustively unit-tested): `src/lib/server/normalized-order.ts` (types `NormalizedClientStoreOrder` + `NormalizedOrderLine` + `AUTONOMOUS_MATCHING_PLATFORMS` union of Shopify/Woo/Squarespace, pure adapters `buildNormalizedOrder(orderRow, itemRows)` + `normalizeWebhookOrderFromLines(webhookPayload)`, fail-open on unmapped platforms via `NormalizeOrderFailureReason` discriminated union) — resolves SKU-AUTO-3 (webhook & poll paths both lower to the same type before entering the hold evaluator); `src/lib/server/normalized-order-loader.ts::loadNormalizedOrder(supabase, orderId)` (DB-backed hydrator that joins `warehouse_orders` + `warehouse_order_items` + `client_store_connections` and applies the pure adapter, returns `{ok: true, order}` / `{ok: false, reason}` with reasons for missing orders, connection lookup failures, platform mismatch, and DB errors); `src/lib/server/order-hold-policy.ts` (the PURE policy — `HoldReason` enum of five reasons + `HOLD_REASON_PRIORITY` + `HOLD_REASON_AUDIENCE` (`clientAlert` vs `staffReview`), `classifyOrderLine(line, state)` returning a discriminated `HoldLineClassification`, `decideOrderHold(classifications)` rolling up into `HoldDecision { shouldHold, holdReason, affectedLines, committableLines, clientAlertRequired, staffReviewRequired }` with deterministic `holdReason` selection by priority — exhaustively unit-tested to prove the webhook path and poll path produce identical decisions for identical inputs); `src/lib/server/order-hold-evaluator.ts::evaluateOrderForHold(supabase, order)` (async orchestrator that batch-fetches alias/identity/inventory/fetch-status in ONE query per table rather than N-per-line, then hands the result to the pure policy); `src/lib/server/sku-candidate-evidence.ts` (the structured-evidence replacement for "one weighted score" per plan §1691–1740 — `DisqualifierCode` enum (17 codes spanning `identity_*`, `variant_*`, `operational_*`, `negative_*`), `CandidateEvidence` struct (`identity`, `variant`, `operational`, `negative` sub-shapes with tri-state `boolean | "unknown"` on variant slots), `buildCandidateEvidence(input)` + `buildCandidateEvidenceFromTitles(input)` (the latter auto-parses canonical/remote titles via `parseMusicVariantDescriptors` before delegating), `classifyEvidenceGates(evidence, {enforceShopifyDefaultLocation?, platform?})` (evaluates identity → variant → operational in plan-order; hard negatives and variant-disagreements short-circuit to `overall='reject'`; partial identity + unknown variants route to `shadow_identity`; identity+variant pass with warehouse=0 routes to `identity_only` or `stock_exception` based on remote stock; Woo/Squarespace skip the default-location sub-check unconditionally), `EvidenceOverall` union `{pass, identity_only, stock_exception, shadow_identity, holdout, reject}`, `IdentityOutcomeState` union matching the `client_store_product_identity_matches.outcome_state` CHECK, `selectOutcomeFromGates(gates, context)` mapping the overall outcome to the DB state (with explicit carve-outs for `nonOperationalRow → auto_skip_non_operational` and `fetchIncomplete → fetch_incomplete_holdout`). `src/lib/server/sku-matching.ts::rankSkuCandidates(canonical, remotes, evidenceContext?)` is ADDITIVE — existing callers that OMIT `evidenceContext` see the legacy return shape exactly (score + reasons + disqualifiers only); new callers that SUPPLY it receive `evidence`, `evidenceGates`, and `disqualifierCodes` on every `RankedSkuCandidate`. New `RankSkuEvidenceContext` shape carries canonical descriptors (auto-parsed from title if omitted), per-remote identity signals (`verifiedRemoteId`, `remoteSkuUniqueWithinConnection`, `canonicalSkuUniqueWithinOrg`), per-remote operational signals (`warehouseStock`, `remoteStock`, `stockedAtDefaultLocation`), and per-remote negative-evidence hints (`nonOperationalRow`, `duplicateRemote`, `genericTitle`, `duplicateCanonicalSku`). Companion tests (all green at landing): `tests/unit/lib/server/normalized-order.test.ts`, `normalized-order-loader.test.ts`, `order-hold-policy.test.ts` (every HoldReason branch + priority + audience routing), `order-hold-evaluator.test.ts` (DB query patterns + batching + error handling via `stubSupabase` helper), `sku-candidate-evidence.test.ts` (50 cases — buildCandidateEvidence, classifyEvidenceGates every branch including hard negatives and platform-specific logic, selectOutcomeFromGates, buildCandidateEvidenceFromTitles integration), `sku-matching.test.ts` (5 additive cases proving zero-break for omitted context + evidence attachment + hard-negative reject + identity-only operational fail + Woo platform default gating). `TRUTH_LAYER.md` autonomous-matching section gains two new invariants: "Normalized order adapter + hold substrate (Phase 2.A/2.B)" and "Structured candidate evidence + gate sequence (Phase 2.C)". `docs/DEFERRED_FOLLOWUPS.md` entry `sku-autonomous-phase2-normalized-order-adapter` is closed; remaining autonomous work (Phase 3 alias-promotion Server Actions, Phase 4 webhook rehydrate, Phase 5+ Trigger tasks, Phase 7 live-alias flag, Phase 8 GA) stays tracked under the existing Phase 3-8 deferred entries. Prior update preserved below.
prior_update: 2026-04-26  # Autonomous SKU matching — Phase 1 RPC `apply_sku_outcome_transition` landed. NEW migration `supabase/migrations/20260428000002_sku_autonomous_matching_phase1_rpc.sql` (applied to remote): RPC `apply_sku_outcome_transition(p_identity_match_id uuid, p_expected_state_version integer, p_expected_from_state text, p_to_state text, p_trigger text, p_reason_code text, p_evidence_snapshot jsonb, p_triggered_by text)` returning `(new_state_version integer, transition_id uuid)` — takes `pg_advisory_xact_lock(hashtext('sku_transition:' || id))` as its first effectful statement (SKU-AUTO-22), then SELECT … FOR UPDATE, OCC checks `state_version`, drift checks `expected_from_state`, enforces terminal-state egress (`auto_reject_non_match` / `auto_skip_non_operational` leave only via `trigger='human_review'`), REFUSES to write `auto_live_inventory_alias` on the identity row (that state belongs to `client_store_sku_mappings` and is written by `promote_identity_match_to_alias`), UPDATEs `outcome_state` + `state_version += 1` + `evaluation_count += 1` + `last_evaluated_at`/`updated_at`, INSERTs one `sku_outcome_transitions` audit row in the same transaction (captures the OLD `outcome_state` as `from_state`). Grants: authenticated + service_role. Extended `src/lib/server/sku-outcome-transitions.ts` with `RpcClient` (uses `PromiseLike` so both the real Supabase PostgrestFilterBuilder and `Promise.resolve(...)` mocks satisfy it), `ApplyOutcomeTransitionCallInput` (narrows `from: OutcomeState` and requires `identityMatchId: string` — the `initial → X` INSERT path is deliberately NOT routed through this wrapper), `ApplyOutcomeTransitionErrorReason` discriminated union, `ApplyOutcomeTransitionResult` tagged union, `mapRpcErrorToReason()` (regex-maps the RPC's `RAISE EXCEPTION` messages back to typed reasons), and `applyOutcomeTransition(supabase, input)` (calls `validateOutcomeTransition()` client-side for defense-in-depth, also rejects `to==auto_live_inventory_alias` before touching the RPC, then forwards a `p_*`-prefixed payload; on RPC error maps to `stale_state_version` / `from_state_drift` / `identity_match_not_found` / `identity_match_inactive` / `terminal_state_non_human_egress` / `to_state_forbidden_on_identity_row` / `rpc_error` / `unexpected_response_shape`). `tests/unit/lib/server/sku-outcome-transitions.test.ts` grew 24 cases: a migration-shape drift guard (SKU-AUTO-14/22 — asserts signature + `pg_advisory_xact_lock` ordering + OCC clauses + from_state drift + terminal-egress + alias-rejection + `reason_code` requirement + INSERT atomicity + grants) plus 15 wrapper cases (short-circuit on validator reject, alias-rejection short-circuit, missing `reasonCode` short-circuit, typed `p_*`-payload assertion, singleton vs array response shape, all six mapped RPC error branches, generic `rpc_error`, malformed response shapes, and a concurrency-sanity check that the wrapper fires exactly ONE RPC call per invocation — no internal retry that could bypass the advisory lock). Live-DB concurrency proof: NEW `tests/integration/sku-outcome-transition-concurrency.test.ts` (gated on `INTEGRATION_TEST_SUPABASE_URL` + `INTEGRATION_TEST_SERVICE_ROLE_KEY`, skips locally, runs under `pnpm test:integration`) creates workspace / org / connection / product / variant / identity-row fixture, fires N=8 parallel `applyOutcomeTransition` calls with the same `expectedStateVersion=1`, asserts exactly one returns `ok=true` and N-1 return `stale_state_version`, identity row's `state_version` bumped from 1 to 2, `evaluation_count` bumped from 1 to 2, exactly one `sku_outcome_transitions` row written with the correct `from_state` / `to_state` / `trigger` / `reason_code`, plus two follow-up cases exercising the alias-rejection and terminal-state-egress contracts. Release-gate flip: `docs/RELEASE_GATE_CRITERIA.md` §C.5 marks SKU-AUTO-14 and SKU-AUTO-22 as **Active** (previously "Pending-Phase-2" / "Active for validator only"). `TRUTH_LAYER.md` autonomous-matching section gains an explicit "State-transition RPC" invariant citing the RPC signature, the lock-before-read ordering rule, and the defense-in-depth reason-code mapping table. `docs/DEFERRED_FOLLOWUPS.md` entry `sku-autonomous-phase1-apply-outcome-transition-rpc` is closed; remaining autonomous work (Phase 2 adapter + ranker, Phase 3 alias-promotion Server Actions, Phase 4 webhook rehydrate, Phase 5+ Trigger tasks, Phase 7 live-alias flag, Phase 8 GA) stays tracked under the existing Phase 2–8 deferred entries. Prior update preserved below.
