  - name: integrations
    paths:
      - src/lib/clients/**
      - src/actions/shopify.ts
      - src/actions/bandcamp.ts
      - src/actions/store-connections.ts
    responsibilities:
      - shopify/bandcamp/store sync
      - first-party Shopify webhook ingress is observe-only for inventory/orders; ShipStation is authoritative for order/inventory movement
      - shipstation/easypost/aftership/stripe/resend wiring (aftership = legacy sunset path; easypost = canonical tracking path post-2026-04-25 hardening)
      - tracking-notification hardening v5 (2026-04-25): central wrapper `src/lib/server/notification-status.ts` is the SOLE writer to `notification_sends.status` and `warehouse_shipments.easypost_tracker_status`; CI guard `scripts/check-notification-status-writes.sh` enforces. EasyPost webhook ingress at `src/app/api/webhooks/easypost/route.ts` + signature helper `src/lib/server/easypost-webhook-signature.ts` (dual-secret rotation, fail-closed in production). Resend webhook + signature at `src/app/api/webhooks/resend/route.ts` + `src/lib/server/resend-webhook-signature.ts`. Append-only provider ledger `notification_provider_events` (with normalized `workspace_id` + `shipment_id` columns for fast drilldown); operator audit `notification_operator_events` (FK → public.users). Public tracking page (`/track/[token]`) PII-allowlisted via `pickPublicDestination` + `PublicTrackingShipment` types; brand-color and image-URL sanitization in templates. Operator surface at `/admin/operations/notifications` plus per-shipment audit drilldown linked from every admin shipment surface. Sensors `notification.send_failure_rate_24h` / `resend.bounce_rate_24h` / `resend.complaint_rate_24h` (filter by `created_at`, count both legacy and new statuses) + `tracking.status_drift_24h` for aftership/easypost parity during the dual-mode sunset window. Release manifest: `docs/RELEASE_SLICES_TRACKING_NOTIFICATION.md`.
      - credential and connection health
      - bandcamp scraper health dashboard (getBandcampScraperHealth)
      - bandcamp Sales Report API (backfill + daily sync)
      - bandcamp sales backfill audit log (chunk-level tracking, verified completion)
      - bandcamp genre tags (HTML scraping + taxonomy matching)
      - bandcamp trending intelligence (dig_deeper API)
      - Bandcamp order sync persists shipping paid (`warehouse_orders.shipping_cost`, `line_items[].shipping`) for fulfillment margin on shipments; `bandcamp-shipping-paid` hydrates from get_orders when the DB never stored it
      - `shipment-fulfillment-cost.ts` is the single owner of fulfillment cost computation (postage + materials + pick/pack); used by `getShipments` (batch, workspace-scoped, chunked .in()) and `getShipmentDetail` (single); returns `partial`/`unknownSkus`/`missingFormatCosts`/`skuFormatMap`; all variant and format-cost queries scoped by workspace_id; integer-cents accumulation to prevent IEEE 754 drift; `batchBuildFormatCostMaps` falls back to `warehouse_products.product_type` via FK join when `format_name` is NULL, normalizing Shopify aliases via `PRODUCT_TYPE_ALIASES` (e.g. "12\" Vinyl" → "LP"); null-format SKUs after fallback are added to `unknownSkus` → `partial: true` → amber dot (never silently skipped)
      - SKU reconciliation and auto-generation
      - workspace_catalog_stats snapshot refresh
      - Shopify product sync completeness (tracking, cost, weight, collections, publishing)
      - Distro discriminator (Phase 0.7, 2026-04-17): `warehouse_products.org_id` is nullable; `org_id IS NULL` = distro item (Clandestine-owned, no client, no Bandcamp upstream). Owner of inserts: `clandestine-shopify-sync` (daily 04:30 UTC). `bandcamp-inventory-push` defensively excludes distro variants. RLS already hides NULL-org rows from clients.
      - Client store dormancy gate (Phase 0.8, 2026-04-17): `client_store_connections.do_not_fanout = TRUE` is the default for Shopify/WooCommerce/Squarespace; ShipStation Inventory Sync is the canonical fanout path. Single chokepoint: `src/lib/server/client-store-fanout-gate.ts::shouldFanoutToConnection()`. Wired into `multi-store-inventory-push`, `client-store-order-detect`, `process-client-store-webhook`, and `createStoreSyncClient`. Reactivation Server Action: `reactivateClientStoreConnection` (staff-only). Admin UI: `/admin/settings/client-store-reconnect`. Portal store UI is hidden (sidebar nav, settings card, home cards) and `/portal/stores` redirects to `/portal`. CI guard: `scripts/check-fanout-gate.sh`.
      - ShipStation v2 inventory client (Phase 2, 2026-04-13): `src/lib/clients/shipstation-inventory-v2.ts` is the SOLE owner of `api.shipstation.com` v2 traffic. Exports `listInventory({ skus?, … })` (auto-chunked at `V2_INVENTORY_LIST_BATCH_LIMIT=50`, cursor-paged on full enumeration) and `adjustInventoryV2()` (single-SKU writes allowed; client-side validation for the Phase 0 Patch D2 boundary — `modify new_available:0` and `decrement quantity:0` rejected, `adjust quantity:0` allowed). Deliberately no `getInventoryBySku` helper — every read goes through the batch path. CI guard: `scripts/check-v2-inventory-batch.sh` (wired into `scripts/release-gate.sh`).
      - SHIP_NOTIFY ingress (Phase 2, 2026-04-13): `/api/webhooks/shipstation` (route handler — HMAC + dedup + enqueue, returns <500ms) plus `process-shipstation-shipment` Trigger task (Trigger.dev runtime — fetches v1 resource_url, resolves org and SKU via 3-tier helpers, calls `recordInventoryChange()` with `correlationId='ssv1:shipment:{id}:{sku}'` and `metadata.source_subtype='ship_notify'`; unresolvable org blocks shipment, unknown SKU isolates per-line failure into review queue). Bandcamp / client store fanout is implicit via `recordInventoryChange()` — no direct external API calls from the processor (Rule #48).
      - ShipStation v2 inventory seed (Phase 3, 2026-04-13): one-shot per workspace via `shipstation-seed-inventory` Trigger task. Owners — task: `src/trigger/tasks/shipstation-seed-inventory.ts`; helper: `src/lib/server/bandcamp-effective-available.ts` (sums `bandcamp_origin_quantities` correctly, NOT the customer-facing TOP `quantity_available` — Part 9 audit); Server Actions: `src/actions/shipstation-seed.ts` (`previewShipStationSeed`, `triggerShipStationSeed`, `listShipStationSeedRuns`); admin UI: `src/app/admin/settings/shipstation-seed/page.tsx`. Selection cascade per plan §7.1.5: `org_id IS NOT NULL` → not a `bundle_components.bundle_variant_id` (Phase 2.5(a) bundle exclusion) → `bandcamp_product_mappings.push_mode='normal'` → `computeEffectiveBandcampAvailable > 0` → `warehouse_inventory_levels.available > 0`. Push value = `warehouse_inventory_levels.available` via `adjustInventoryV2({ transaction_type:'increment' })`. Idempotent via `external_sync_events` ledger keyed by `(system='shipstation_v2', correlation_id='seed:{workspace_id}:{run_id}', sku, action='increment')`. Pinned to `shipstation` queue (concurrency 1, shared with `process-shipstation-shipment`). Dry-run mode skips the v2 call and reports gate counts. Bulk-shaped (Rule #59) — does NOT route through `recordInventoryChange()`; reconcile sensor (Phase 5) catches drift. Run history surfaced in `channel_sync_log` (`channel='shipstation_v2'`, `sync_type='seed_inventory'`).
      - ShipStation store refresh stub (Phase 3, 2026-04-13): `shipstation-store-refresh` task — currently returns `status:'deferred'` because Open Question #2 (public refresh endpoint existence) is unresolved. Records the request in `channel_sync_log` (`channel='shipstation_v1'`, `sync_type='store_refresh'`) and relies on the 24h auto-import + Phase 5 reconcile sensor as the day-one race fallback. Wiring sites can call it today; only the internal implementation flips when the endpoint is confirmed.
      - Bandcamp warehouse seed correction (Phase 1 follow-up #2, 2026-04-13): `src/lib/server/bandcamp-effective-available.ts::computeBandcampSeedQuantity({ quantity_available, origin_quantities })` is the single helper that decides what value `bandcamp-sync` writes to `warehouse_inventory_levels.available` on first ingest. Decision tree: non-empty `origin_quantities` array → trust origin sum (even when 0 — baseline-anomaly merchants land here and Phase 1 audit flips `push_mode='blocked_baseline'`); else TOP > 0 → fall back to TOP and tag `effective_source='top_fallback'` in `recordInventoryChange` metadata; else 0. Both seed sites in `src/trigger/tasks/bandcamp-sync.ts` (existing-mapping `bandcamp_initial` branch and brand-new-variant block) consume the helper; downstream auditing greps `warehouse_inventory_activity.metadata->>effective_source`. Hard prerequisite for Phase 4's bidirectional bridge.
      - Bandcamp apparel multi-variant create path (Phase A, 2026-04-20). Owners — helper `src/trigger/lib/bandcamp-apparel.ts` (`detectMultiVariantOptions`, `inferOptionName`, `optionDisplayValue`); extended variant builder `src/lib/clients/shopify-variant-input.ts` (`optionName` + `optionValue` parameters); new Shopify read helper `fetchProductVariantsByProductId` in `src/lib/clients/shopify-client.ts`; patched create branch in `src/trigger/tasks/bandcamp-sync.ts` immediately after `existingMappingByPackage`; migration `supabase/migrations/20260420000005_variant_bandcamp_option.sql` adds `warehouse_product_variants.bandcamp_option_id` (bigint) + `bandcamp_option_title` (text) with partial index `idx_variants_bandcamp_option`. NEW packages with ≥2 distinct option SKUs materialize as N variants under one warehouse_product (option name inferred — `Size` / `Color` / `Variant`, NEVER `Title`); single mapping row per package keeps the `uq_bandcamp_mappings_workspace_item_id` unique index intact while per-option attribution lives on each variant row. Inventory seeded per option through `recordInventoryChange()` with stable `bandcamp-seed:{band_id}:{package_id}:opt:{option_id}` correlation IDs. SKU collisions raise `bandcamp_apparel_sku_collision` review items rather than auto-merging. Pre-existing umbrella apparel (the 616 `tracked_as_metadata` SKUs from the 2026-04-20 audit) is left in place; Path B/C structural backfill is queued. Coverage verified by `scripts/audit-bandcamp-vs-db-and-shopify.ts` (now classifies `tracked_as_metadata` and uses `normSku()` on mapping option SKUs so apparel SKUs with `&` / spaces match). Tests: `tests/unit/trigger/bandcamp-apparel.test.ts` (14 tests). Audit summary 2026-04-20: 1372 fully_aligned, 616 tracked_as_metadata, 1 in_db_missing_from_shopify, 0 missing_from_db_and_shopify (out of 1989 Bandcamp SKU rows / 1372 packages).
      - Bandcamp orphan-Shopify dupe protection (2026-04-19): unmatched `bandcamp-sync` path is DB-first to prevent external orphan explosions: insert `warehouse_products` with `shopify_product_id = NULL`, insert `warehouse_product_variants` with explicit error handling/rollback, insert `bandcamp_product_mappings`, then call Shopify `productSetCreate` and patch `warehouse_products.shopify_product_id`. Package-level dedup is keyed on `(workspace_id, bandcamp_item_id)` with unique partial index `uq_bandcamp_mappings_workspace_item_id` (migration `20260419000001_bandcamp_package_dedup_backstop.sql`). Runtime guardrails now include: early task exit when `workspaces.bandcamp_sync_paused = true`, definitive package-mapping re-check before Shopify create, and immediate `productArchive` rollback + high-severity review item when Shopify create succeeds but DB attach verification fails. Cleanup utilities: `scripts/cleanup-bandcamp-orphan-shopify.ts` (DB-linked orphans) and `scripts/cleanup-unmanaged-shopify.ts` (unmanaged Shopify drafts, archive-only, dry-run + batch + CSV artifacts).
      - Bundle availability shared helper (Phase 2.5(b), 2026-04-13): `src/lib/server/bundles.ts::computeBundleAvailability(components, componentInventory)` and `computeEffectiveBundleAvailable(bundleStockOnHand, components, componentInventory)` are the canonical bundle math. Currently consumed by `bandcamp-inventory-push.ts` (replaced inline `MIN(rawAvailable, MIN(component_available / qty))` math). Phase 4 v2 fanout will consume the same helper. Empty `components[]` returns `+Infinity` so callers can chain naturally with `Math.min(bundleStock, …)`. Per-unit `quantity ≤ 0` is normalized to `1` (defensive — never propagates a divide-by-zero).
      - Bundle derived-drift sensor (Phase 2.5(c), 2026-04-13): `src/trigger/tasks/bundle-derived-drift.ts` (`bundle-derived-drift-sensor` + `bundle-derived-drift-sensor-schedule` exporting `runBundleDerivedDriftSensor` for tests). Hourly cron pinned to `shipstation` queue. Per workspace: derives bundle SKU availability via `computeEffectiveBundleAvailable`, batch-fetches v2 inventory via `listInventory({ skus })`, and opens a `warehouse_review_queue` row (`category='inventory_drift'`, `severity='medium'`, `group_key='bundle.derived_drift:{workspace_id}:{sku}'`) when `|v2.available - derived| > BUNDLE_DRIFT_TOLERANCE` (default 2 units). Re-detection bumps `occurrence_count` (Rule #55). Bundle SKUs that v2 does NOT return are skipped — Phase 2.5(a) excludes bundles from seed by design. Sensor never writes inventory; Rule #20 untouched.
      - Phase 5 tiered reconcile + sku_sync_status view (2026-04-13): three Trigger.dev schedule wrappers (`shipstation-bandcamp-reconcile-{hot,warm,cold}-schedule` at `*/5 * * * *` / `*/30 * * * *` / `0 */6 * * *`) plus on-demand `shipstation-bandcamp-reconcile-task` all delegate to a single `runShipstationBandcampReconcile(tier, payload, ctx, deps)` in `src/trigger/tasks/shipstation-bandcamp-reconcile.ts`. All four pinned to `shipstation` queue (concurrency 1, shared with seed/SHIP_NOTIFY/v2-decrement/bundle-drift). Per-workspace skip cascade — `workspaces.shipstation_v2_inventory_warehouse_id`/`_location_id` IS NOT NULL (else `skipped_no_v2_defaults`); bundle parents excluded (Phase 2.5(c) `bundle-derived-drift-sensor` owns them); tier candidate selection — hot = `available <= 10` UNION 24h-negative-activity SKUs, warm = 30d-negative-activity SKUs, cold = full per-workspace catalog. Reads via `listInventory({ skus, inventory_warehouse_id, inventory_location_id })` — Rule §7.1.6, NEVER `getInventoryBySku`. SKU-at-zero equality: missing v2 row treated as `available: 0` (Phase 0 §4.2.3). Drift thresholds (plan §7.1.6.1): `|drift| <= 1` silent auto-fix, `2-5` low-severity review, `> 5` high-severity review. Auto-fix ALWAYS via `recordInventoryChange({ source:'reconcile', correlationId:'reconcile:{tier}:{run_id}:{sku}' })` — schema migration `20260413000030_phase5_reconcile_and_sku_sync_status.sql` extends `warehouse_inventory_activity_source_check` to admit `'reconcile'`. NEVER writes to v2 (v2 is source of truth). Review queue dedup via `group_key='reconcile.qty_drift:{workspace_id}:{sku}'` (Rule #55, may escalate severity). Per-tier `channel_sync_log` rows (`channel='shipstation_v2'`, `sync_type='reconcile_{tier}'`) drive admin monitoring page `/admin/settings/shipstation-inventory` (`src/app/admin/settings/shipstation-inventory/page.tsx` + Server Actions in `src/actions/shipstation-inventory-monitor.ts` — `getReconcileDriftSummary`, `listReconcileRuns`, `getSkuSyncStatus`, `triggerReconcileRun`). Companion view `sku_sync_status` (in same Phase 5 migration) denormalizes per-variant: distro flag, Bandcamp mapping presence, `bandcamp_push_mode`, baseline-anomaly status, sku-conflict status, last successful v2/Bandcamp push timestamps, last external error message, available, last-internal-write timestamp. Live view today; materialization deferred until any admin surface exceeds 500ms p95 (Open Question #9).
      - Saturday Workstream 3 (2026-04-18) — count sessions + warehouse locations source-of-truth. Owners — Server Actions `src/actions/inventory-counts.ts` (`startCountSession`, `setVariantLocationQuantity`, `completeCountSession`, `cancelCountSession`, `getCountSessionState` — `count_in_progress` SUPPRESSES fanout; `completeCountSession` re-reads current `available` (Scenario A defense — count-after-sale yields delta=0) then routes a single delta through `recordInventoryChange({ source:'cycle_count' })`; sets sticky `has_per_location_data=true` on first per-location write) and `src/actions/locations.ts` (`listLocations`, `createLocation`, `createLocationRange`, `updateLocation`, `deactivateLocation`, `retryShipstationLocationSync` — one-way mirror to ShipStation v2 via `createInventoryLocation` / `updateInventoryLocation` / `deleteInventoryLocation`; rename calls v2 FIRST so retry has truth to retry from; 409 conflicts resolved via `listInventoryLocations`). Trigger task `src/trigger/tasks/bulk-create-locations.ts` (offload for ranges >30 entries, pinned to `shipstation` queue, partial failures surface as one `warehouse_review_queue` row at exit). UI component `src/components/admin/inventory-count-session-panel.tsx` mounted in `/admin/inventory` expanded-row detail (above the Locations / Recent Activity 2-col grid) — provides Start / In-progress badge / per-location editable list (debounced `setVariantLocationQuantity`) / locator typeahead with inline `createLocation` / Complete + Cancel; standalone `/admin/inventory/locations` page deferred to Sunday. ShipStation v2 client gains `createInventoryLocation` / `updateInventoryLocation` / `deleteInventoryLocation` in `src/lib/clients/shipstation-inventory-v2.ts` (defensive against legacy API shapes). Schema came from WS1 migration — no new migration. Per-location semantics probe (plan §15.3) GATES the deferred WS3 §3f rewrite of `shipstation-v2-sync-on-sku` to per-location enqueue; until then writes route through the existing SKU-level v2 path. Companion tests `tests/unit/actions/inventory-counts.test.ts` + `tests/unit/actions/locations.test.ts` + `tests/unit/lib/clients/shipstation-inventory-v2.test.ts` (Rule #6).
      - Saturday Workstream 2 (2026-04-18) — manual inventory count entry. Owners — Server Actions `src/actions/manual-inventory-count.ts` (`getManualCountTable`, `submitManualInventoryCounts`); Trigger task `src/trigger/tasks/shipstation-v2-adjust-on-sku.ts` (sibling of `shipstation-v2-decrement`, handles BOTH directions of delta — `transaction_type:'increment'` for positive, `'decrement'` for negative; pinned to `shipstation` queue; ledger-gated via `external_sync_events`; same skip cascade as the existing decrement task); admin UI `/admin/inventory/manual-count` (`src/app/admin/inventory/manual-count/page.tsx` — bulk table editor scoped per-client, dirty-state delta preview, confirmation dialog for high-delta / zero-crossing rows). Negative-result writes hard-blocked AND a `warehouse_review_queue` row upserted (`category='manual_count_negative_block'`, `severity='high'`, `group_key='manual-count.negative-block:{workspaceId}:{sku}'`). Fanout: Bandcamp + Clandestine Shopify + client store fanout happens automatically via the existing `recordInventoryChange()` → `fanoutInventoryChange()` → `loadFanoutGuard` path; ShipStation v2 fanout uses the new sibling task because the central pipeline does not include v2 (Phase 4 design). Companion test `tests/unit/actions/manual-inventory-count.test.ts` (Rule #6 — 13 tests covering threshold gates, zero-crossing gates, force-true bypass, unknown-SKU + cross-org defense, count-in-progress skip, ShipStation enqueue resilience, MAX_ENTRIES_PER_BATCH=200 validation, stable correlationId per (user, batch, sku)). Sidebar nav updated: "Manual Count" NAV_ITEMS entry below Inventory.
