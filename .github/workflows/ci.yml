name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-gate:
    name: Lint / Type / Test / Build / Guards
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint + format
        run: pnpm check

      - name: TypeScript
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

      - name: '"use server" exports guard'
        # Fast (~200ms) pre-build gate that catches non-async-function
        # exports from `"use server"` modules before they reach the
        # Next.js build step (where the failure is cryptic, points
        # at compiled `.next/server/*` chunks, and costs ~90s to
        # reproduce). Runs ahead of `pnpm build` so the cheap check
        # shields the expensive step. See
        # scripts/check-use-server-exports.ts for the rule set.
        run: bash scripts/ci-use-server-exports-guard.sh

      - name: Next.js build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SENTRY_DSN: https://placeholder@sentry.io/0
          NEXT_PUBLIC_APP_URL: https://placeholder.vercel.app

      - name: Inventory write-path guard
        run: bash scripts/ci-inventory-guard.sh

      - name: Webhook dedup guard
        run: bash scripts/ci-webhook-dedup-guard.sh

      - name: SKU identity not-in-fanout guard (SKU-AUTO-1)
        run: bash scripts/ci-checks/sku-identity-no-fanout.sh

      - name: SKU alias single-writer guard (SKU-AUTO-2)
        # Keeps the set of direct writers to `client_store_sku_mappings`
        # pinned to a minimal whitelist. Any NEW direct writer fails CI
        # and must either route through `persist_sku_match` or be added
        # to the whitelist with a SKU-AUTO-2 note.
        run: bash scripts/ci-checks/sku-aliases-single-writer.sh

  release-gate-check:
    # F-7 — Direct-Shopify cutover hard gates (Section C.1 of
    # docs/RELEASE_GATE_CRITERIA.md). Runs only on `main` since these gates
    # gate cutover-tagging, not every PR. Schema gates auto-skip when
    # DATABASE_URL is absent (the test-file gates still run).
    name: Release gate (Section C.1) — main only
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: audit-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run finish-line release gate script
        env:
          # Cutover-pinned API version. The gate fails if this drifts.
          SHOPIFY_API_VERSION: 2026-01
          # Echo flag must be EXPLICITLY set; "off" is fine pre-cutover.
          # Operators flip this to "on" once direct traffic is verified.
          WEBHOOK_ECHO_SHOPIFY_DIRECT: off
        run: bash scripts/check-release-gates.sh

  deploy-trigger:
    name: Deploy Trigger.dev tasks
    needs: audit-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Trigger.dev
        # CLI version MUST match the SDK pin in pnpm-lock.yaml — Trigger.dev
        # refuses to deploy on any drift ("Version mismatch detected while
        # running in CI. This won't end well. Aborting."). Bump this in lockstep
        # whenever @trigger.dev/sdk and @trigger.dev/build change in
        # package.json. The CLI takes auth from TRIGGER_ACCESS_TOKEN — a
        # Personal Access Token from https://cloud.trigger.dev/account/tokens,
        # NOT the SDK runtime secret (TRIGGER_SECRET_KEY).
        run: npx trigger.dev@4.4.3 deploy --skip-update-check
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
